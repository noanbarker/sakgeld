<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Sprout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      /* ── Sprout Design Tokens ─────────────────────────────────── */
      :root {
        /* Green (primary brand) */
        --color-green-50:    #f0fdf4;
        --color-green-100:   #dcfce7;
        --color-green-200:   #bbf7d0;
        --color-green-300:   #86efac;
        --color-green-400:   #4ade80;
        --color-green-500:   #22c55e;
        --color-green-600:   #16a34a;
        --color-green-700:   #15803d;
        --color-green-800:   #14532d;
        --color-green-900:   #052e16;
        /* Gold (coins/earnings) */
        --color-gold-50:     #fef9c3;
        --color-gold-200:    #fde68a;
        --color-gold-400:    #fbbf24;
        --color-gold-800:    #b45309;
        --color-gold-900:    #78350f;
        /* Coral (accent / second kid) */
        --color-coral-100:   #ffe4e6;
        --color-coral-300:   #fca5a5;
        --color-coral-500:   #f43f5e;
        --color-coral-800:   #be123c;
        /* Blue (third kid / info) */
        --color-blue-100:    #dbeafe;
        --color-blue-300:    #93c5fd;
        --color-blue-600:    #2563eb;
        --color-blue-800:    #1e40af;
        /* Semantic aliases kept for backward compat */
        --color-blue:        #2563eb;
        --color-blue-light:  #60a5fa;
        --color-blue-pale:   #bfdbfe;
        --color-blue-bg:     #dbeafe;
        --color-blue-border: #93c5fd;
        --color-blue-text:   #1e40af;
        --color-blue-dark:   #1d4ed8;
        --color-green:       #16a34a;
        --color-green-bg:    #dcfce7;
        --color-green-border:#86efac;
        --color-green-text:  #15803d;
        --color-coral:       #f43f5e;
        --color-coral-bg:    #ffe4e6;
        --color-coral-border:#fca5a5;
        --color-coral-text:  #be123c;
        --color-purple:      #7c3aed;
        /* Neutrals */
        --color-text-primary:   #1e293b;
        --color-text-secondary: #64748b;
        --color-text-muted:     #64748b;
        --color-background:     #f6faf7;
        --color-surface:        #ffffff;
        --color-border:         #e5ece7;
        --color-success:        #16a34a;
        --color-danger:         #f43f5e;
        --color-warning:        #fbbf24;
        /* Gradients */
        --gradient-primary:    linear-gradient(132deg, #16a34a 0%, #15803d 100%);
        --gradient-stripe:     linear-gradient(90deg,#16a34a 0%,#16a34a 33.333%,#fbbf24 33.333%,#fbbf24 66.666%,#f43f5e 66.666%,#f43f5e 100%);
        --gradient-blob-green: linear-gradient(135deg, #dcfce7, #bbf7d0 50%, #d1fae5);
        --gradient-blob-gold:  linear-gradient(135deg, #fef9c3, #fde68a 50%, #fef3c7);
        --gradient-page:       linear-gradient(170deg, #f0fdf4 0%, #ecfdf5 45%, #f0f9ff 100%);
        --font-family:         'Nunito', system-ui, sans-serif;
        --radius-sm:   8px;
        --radius-md:  14px;
        --radius-lg:  16px;
        --radius-xl:  32px;
        --radius-full:9999px;
        --shadow-card:         0 24px 64px rgba(22,163,74,0.13), 0 4px 20px rgba(0,0,0,0.06), 0 0 0 1px rgba(22,163,74,0.08);
        --shadow-button:       0 10px 28px rgba(22,163,74,0.38), 0 2px 8px rgba(0,0,0,0.07);
        --shadow-button-hover: 0 14px 32px rgba(22,163,74,0.50), 0 2px 8px rgba(0,0,0,0.07);
        --shadow-sm:           0 1px 3px rgba(15,40,25,0.07);
        --anim-blob-duration:  10s;
        --anim-blob-duration-2:13s;
        --anim-easing:         ease-in-out;
        --anim-transition-fast:150ms ease;
        --anim-transition-base:200ms ease;
      }

      @keyframes treeSway {
        0%, 100% { transform: rotate(-1.5deg); transform-origin: 60px 128px; }
        50%       { transform: rotate(1.5deg);  transform-origin: 60px 128px; }
      }
      @keyframes logoIconEnter {
        0%   { opacity: 0; transform: scale(0.6) rotate(-6deg); }
        100% { opacity: 1; transform: scale(1)   rotate(0deg); }
      }
      @keyframes logoIconExit {
        0%   { opacity: 1; transform: scale(1)   rotate(0deg); }
        100% { opacity: 0; transform: scale(0.6) rotate(6deg); }
      }
      .logo-icon-inner {
        display: flex; align-items: center; justify-content: center;
        animation: logoIconEnter 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
      }
      @keyframes coinBob1 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-5px); }
      }
      @keyframes coinBob2 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-7px); }
      }
      @keyframes coinBob3 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-4px); }
      }
      @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
        45%       { opacity: 1; transform: scale(1.3) rotate(22deg); }
        65%       { opacity: 0.7; transform: scale(1) rotate(12deg); }
      }
      @keyframes leafSway {
        0%, 100% { transform: rotate(0deg) scale(1); }
        50%       { transform: rotate(6deg) scale(1.05); }
      }
      @keyframes leafDrift {
        0%   { transform: translate(0,0) rotate(0deg); opacity:0.8; }
        100% { transform: translate(-28px,-58px) rotate(-45deg); opacity:0; }
      }
      @keyframes blobMorph {
        0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        50%       { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
      }
      @keyframes fadeInUp {
        from { opacity:0; transform:translateY(14px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes floatUp {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-9px); }
      }
      @keyframes growUp {
        from { transform:scaleY(0); transform-origin:bottom center; opacity:0; }
        to   { transform:scaleY(1); transform-origin:bottom center; opacity:1; }
      }
      @keyframes coinRain {
        0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
        100% { transform:translateY(60px) rotate(180deg); opacity:0; }
      }

      * { -webkit-tap-highlight-color: transparent; }
      body {
        font-family: var(--font-family);
        background: var(--gradient-page);
        background-color: var(--color-background);
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── Component classes ────────────────────────────────────── */
      .pr-card {
        background: var(--color-surface);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-card);
        overflow: hidden;
        position: relative;
      }
      .pr-stripe {
        position: absolute; top:0; left:0; right:0;
        height: 5px; background: var(--gradient-stripe); z-index: 2;
      }
      .pr-blob-top {
        position:absolute; top:-90px; right:-90px;
        width:280px; height:280px;
        background: var(--gradient-blob-green);
        opacity:0.6; pointer-events:none;
        animation: blobMorph var(--anim-blob-duration) var(--anim-easing) infinite;
      }
      .pr-blob-bottom {
        position:absolute; bottom:-70px; left:-70px;
        width:220px; height:220px;
        background: var(--gradient-blob-gold);
        opacity:0.5; pointer-events:none;
        animation: blobMorph var(--anim-blob-duration-2) var(--anim-easing) infinite 3s;
      }
      .sp-tree-logo {
        animation: treeSway 4.5s var(--anim-easing) infinite;
      }
      .sp-chore-icon {
        animation: floatUp 3.2s var(--anim-easing) infinite;
      }
      .pr-btn-primary {
        width:100%; padding:18px 22px;
        background: var(--gradient-primary);
        border:none; border-radius: var(--radius-lg);
        box-shadow: var(--shadow-button);
        font-family: var(--font-family);
        font-size:16px; font-weight:800; color:#fff;
        cursor:pointer;
        transition: transform var(--anim-transition-fast), box-shadow var(--anim-transition-fast);
        display:flex; align-items:center; gap:11px;
      }
      .pr-btn-primary:hover  { transform:translateY(-1px); box-shadow:var(--shadow-button-hover); }
      .pr-btn-primary:active { transform:translateY(0);    box-shadow:var(--shadow-button); }
      .pr-section-label {
        font-family: var(--font-family);
        font-size:11px; font-weight:800;
        letter-spacing:0.08em; text-transform:uppercase;
        color: var(--color-text-muted);
      }
      .chip-btn {
        font-family:var(--font-family); font-size:12px; font-weight:700;
        border-radius:9999px; padding:5px 12px; cursor:pointer;
        border:1.5px solid var(--color-border); background:var(--color-surface);
        color:var(--color-text-secondary); transition:border-color .12s,color .12s;
      }
      .chip-btn:hover { border-color:var(--color-green-500); color:var(--color-green-700); }
      .icon-btn {
        width:30px; height:30px; border-radius:8px; border:none; background:none;
        cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
        color:var(--color-text-muted); transition:background .12s,color .12s;
      }
      .icon-btn:hover { background:var(--color-green-50); color:var(--color-green-700); }
      .icon-btn.danger:hover { background:var(--color-coral-bg); color:var(--color-coral-text); }
      .stat-card {
        background:var(--color-surface); border:1px solid var(--color-border);
        border-radius:var(--radius-md); box-shadow:var(--shadow-sm); padding:16px 18px;
      }

      /* ── Legacy compat ────────────────────────────────────────── */
      .pin-dot {
        width:16px; height:16px; border-radius:50%;
        border:2px solid var(--color-green-600); transition:background 0.15s;
      }
      .pin-dot.filled { background: var(--color-green-600); }
      .numpad-btn {
        height:64px; font-size:22px; font-weight:700; font-family:var(--font-family);
        border-radius:var(--radius-lg); background:var(--color-surface);
        border:1.5px solid var(--color-border); box-shadow:var(--shadow-sm);
        transition:background 0.1s; cursor:pointer;
      }
      .numpad-btn:active { background:#f1f5f9; }
      .tab-active   { color:var(--color-green-600); border-bottom:2px solid var(--color-green-600); }
      .tab-inactive { color:#6b7280; }
      .card {
        background:var(--color-surface); border-radius:var(--radius-md);
        border:1px solid var(--color-border);
        padding:16px; box-shadow:var(--shadow-sm);
      }
      .sidebar-item {
        display:flex;align-items:center;gap:12px;width:100%;padding:10px 14px;
        border-radius:12px;font-size:14px;font-weight:700;font-family:var(--font-family);
        transition:background 0.15s;text-align:left;
      }
      .sidebar-item                   { color:rgba(255,255,255,0.65); border:1px solid transparent; }
      .sidebar-item:not(.active):hover{ background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85); }
      input, select {
        outline:none; border:1.5px solid var(--color-border);
        border-radius:var(--radius-md); padding:10px 14px !important;
        width:100%; font-size:15px; font-family:var(--font-family);
        transition:border-color 0.15s; color:var(--color-text-primary);
      }
      input:focus, select:focus { border-color:var(--color-green-600); }
      .btn-primary {
        background:var(--gradient-primary); color:white;
        border-radius:var(--radius-lg); padding:12px;
        font-weight:800; font-size:16px; width:100%;
        font-family:var(--font-family); border:none;
        box-shadow:var(--shadow-button); transition:opacity 0.15s; cursor:pointer;
      }
      .btn-primary:active { opacity:0.85; }
      .btn-outline {
        border:1.5px solid var(--color-border); color:#374151;
        border-radius:var(--radius-lg); padding:12px;
        font-weight:700; font-size:15px; width:100%;
        font-family:var(--font-family); background:transparent; cursor:pointer;
      }
      .badge {
        display:inline-flex; align-items:center; justify-content:center;
        background:#f59e0b; color:white; font-size:11px; font-weight:800;
        min-width:18px; height:18px; border-radius:9999px; padding:0 5px;
      }

      /* ── Mobile overrides ────────────────────────────── */
      @media (max-width: 640px) {

        /* Parent dashboard content area */
        .sp-tab-content { padding: 14px 16px !important; }

        /* Mobile tab bar — show icon only, hide text label */
        .sp-mob-tab { display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 2px !important; }
        .sp-mob-tab-svg { display:flex; }
        .sp-mob-tab-svg svg { width:18px; height:18px; }
        .sp-mob-tab-label { font-size:8px !important; letter-spacing:0 !important; }

        /* Kid view: tighten header padding */
        .sp-kid-header { padding: 20px 16px 18px !important; }

        /* Kid view: shrink the balance number */
        .sp-kid-balance { font-size: 32px !important; }

        /* Kid view: hide the right spacer, shrink the tree */
        .sp-kid-spacer { display: none !important; }
        .sp-kid-tree { flex: 0 0 auto !important; }
        .sp-kid-tree svg { width: 80px !important; height: 80px !important; }

        /* Kid view: let the progress bar stretch */
        .sp-kid-progress-bar { width: 100% !important; max-width: 240px !important; }

        /* Kid content area */
        .sp-kid-content { padding: 16px 14px !important; }

        /* Card padding */
        .card { padding: 14px !important; }

        /* Weekly summary card: full width on mobile */
        .sp-weekly-card { max-width: 100% !important; }

        /* Modals */
        .modal-sheet { padding: 20px 16px 28px !important; }
      }
    </style>
</head>

let currentUser = null;
let cache = { kids: [], chores: [], completions: [], transactions: [], bonusMilestones: [] };
const DB = { load: () => cache };

async function loadCache() {
    const uid = currentUser.id;
    const [kRes, cRes, compRes, txRes, bmRes] = await Promise.all([
        sb.from('kids').select('*').eq('user_id', uid),
        sb.from('chores').select('*').eq('user_id', uid),
        sb.from('completions').select('*').eq('user_id', uid),
        sb.from('transactions').select('*').eq('user_id', uid),
        sb.from('bonus_milestones').select('*').eq('user_id', uid),
    ]);
    cache = {
        kids: kRes.data || [],
        chores: (cRes.data || []).map(c => ({ ...c, assignedTo: c.assigned_to, oneOff: c.one_off || false, expiresOn: c.expires_on || null })),
        completions: (compRes.data || []).map(c => ({ ...c, choreId: c.chore_id, kidId: c.kid_id, completedAt: c.completed_at, dueDate: c.due_date || null, missed: c.missed || false })),
        transactions: (txRes.data || []).map(t => ({ ...t, kidId: t.kid_id, createdAt: t.created_at })),
        bonusMilestones: (bmRes.data || []).map(m => ({ ...m, assignedTo: m.assigned_to, bonusAmount: m.bonus_amount, claimedBy: m.claimed_by || [] })),
    };
}

async function initApp() {
    document.getElementById('app').innerHTML = '<div class="min-h-screen flex items-center justify-center"><p style="color:var(--color-text-secondary)">Loading…</p></div>';
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        currentUser = session.user;
        const savedCurrency = session.user?.user_metadata?.currency;
        if (savedCurrency) localStorage.setItem('sprout_currency', savedCurrency);
        await loadCache();
    }
    render();
    sb.auth.onAuthStateChange(async (event, session) => {
        currentUser = session?.user || null;
        if (currentUser) { await loadCache(); }
        else { cache = { kids: [], chores: [], completions: [], transactions: [], bonusMilestones: [] }; S.view = 'home'; }
        render();
    });
}

const DEFAULT_TREE_THRESHOLDS = { t1: 100, t2: 250, t3: 500, t4: 1000 };

function loadTreeThresholds() {
    const fromMeta = currentUser?.user_metadata?.tree_thresholds;
    if (fromMeta) return { ...DEFAULT_TREE_THRESHOLDS, ...fromMeta };
    try {
        const s = localStorage.getItem('sprout_tree_thresholds');
        return s ? { ...DEFAULT_TREE_THRESHOLDS, ...JSON.parse(s) } : { ...DEFAULT_TREE_THRESHOLDS };
    } catch { return { ...DEFAULT_TREE_THRESHOLDS }; }
}
async function saveTreeThresholds(t) {
    const { data, error } = await sb.auth.updateUser({ data: { tree_thresholds: t } });
    if (error) { toast('❌ Could not save thresholds.'); return false; }
    if (data?.user) currentUser = data.user;
    localStorage.setItem('sprout_tree_thresholds', JSON.stringify(t));
    return true;
}
function getTreeStage(balance) {
    const t = loadTreeThresholds();
    if (balance < t.t1) return 0;
    if (balance < t.t2) return 1;
    if (balance < t.t3) return 2;
    if (balance < t.t4) return 3;
    return 4;
}

// ─── UTILS ───────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function getCurrencyCode() {
    return localStorage.getItem('sprout_currency') || currentUser?.user_metadata?.currency || 'ZAR';
}
function currSymbol() {
    const code = getCurrencyCode();
    if (code === 'pts') return '';
    return (CURRENCIES.find(c => c.code === code) || { symbol: 'R' }).symbol;
}
function R(n) {
    const code = getCurrencyCode();
    if (code === 'pts') return (+(n || 0)).toFixed(0) + ' pts';
    const curr = CURRENCIES.find(c => c.code === code) || { symbol: 'R' };
    const decimals = NO_DECIMAL_CURRENCIES.includes(code) ? 0 : 2;
    return curr.symbol + ' ' + (+(n || 0)).toFixed(decimals);
}
function dateStr(iso) { return new Date(iso).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' }); }
function kidIcon(kidOrName) {
    if (kidOrName && typeof kidOrName === 'object') {
        if (kidOrName.emoji) return kidOrName.emoji;
        kidOrName = kidOrName.name || '';
    }
    const icons = ['🧒','👦','👧','🧑','🐻','🦁','🐯','🦊'];
    let h = 0; for (const c of String(kidOrName)) h += c.charCodeAt(0);
    return icons[h % icons.length];
}

function weekStart() {
    const d = new Date(); const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    const mon = new Date(d); mon.setDate(d.getDate() + diff); mon.setHours(0,0,0,0); return mon;
}
function weeklyEarned(db, kidId) {
    const mon = weekStart();
    return db.transactions
        .filter(t => t.kidId === kidId && t.type === 'chore' && new Date(t.createdAt) >= mon)
        .reduce((s, t) => s + t.amount, 0);
}
function weeklyPossible(db, kidId) {
    const mon = weekStart();
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const monStr = toLocalDateStr(mon);
    const sunStr = toLocalDateStr(sun);

    return db.chores
        .filter(c => choreAssignedTo(c, kidId))
        .reduce((s, c) => {
            if (c.oneOff) {
                // Include ad hoc chores that fall within the current week
                const exp = c.expiresOn || '';
                return (exp >= monStr && exp <= sunStr) ? s + c.value : s;
            }
            const freq = (!c.schedule || c.schedule === 'daily') ? 7 : (c.days || []).length;
            return s + (c.value * freq);
        }, 0);
}
function choreScheduleLabel(c) {
    if (c.oneOff) return 'Today only';
    if (!c.schedule || c.schedule === 'daily') return 'Daily';
    if (!c.days || c.days.length === 0) return 'No days set';
    if (c.days.length === 7) return 'Daily';
    return c.days.join(', ');
}
function choreIsForToday(c) {
    if (c.oneOff) return c.expiresOn === toLocalDateStr(new Date());
    if (!c.schedule || c.schedule === 'daily') return true;
    const today = DAYS[(new Date().getDay() + 6) % 7];
    return (c.days || []).includes(today);
}
function toLocalDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function choreIsForDate(c, d) {
    if (c.oneOff) return c.expiresOn === toLocalDateStr(d);
    if (!c.schedule || c.schedule === 'daily') return true;
    const day = DAYS[(d.getDay() + 6) % 7];
    return (c.days || []).includes(day);
}
async function writeMissedChores(kidId) {
    const db = DB.load();
    const inserts = [];
    for (let ago = 1; ago <= 7; ago++) {
        const d = new Date();
        d.setDate(d.getDate() - ago);
        const due = toLocalDateStr(d);
        const scheduled = db.chores.filter(c => choreAssignedTo(c, kidId) && choreIsForDate(c, d));
        for (const chore of scheduled) {
            const exists = cache.completions.some(c =>
                c.choreId === chore.id && c.kidId === kidId && c.dueDate === due
            );
            if (!exists) {
                const id = uid();
                const rec = {
                    id, user_id: currentUser.id,
                    chore_id: chore.id, kid_id: kidId,
                    completed_at: due + 'T23:59:59.000Z',
                    due_date: due, approved: false, rejected: false, missed: true
                };
                inserts.push(rec);
                cache.completions.push({ id, choreId: chore.id, kidId, completedAt: rec.completed_at, dueDate: due, approved: false, rejected: false, missed: true });
            }
        }
    }
    if (inserts.length) {
        await sb.from('completions').insert(inserts);
        render();
    }
}
function choreAssignedTo(c, kidId) {
    if (!c.assignedTo || c.assignedTo === 'all') return true;
    if (Array.isArray(c.assignedTo)) return c.assignedTo.includes(kidId);
    return c.assignedTo === kidId;
}
function choreAssignmentLabel(c, kids) {
    if (!c.assignedTo || c.assignedTo === 'all') return 'All kids';
    if (Array.isArray(c.assignedTo)) {
        if (c.assignedTo.length === kids.length) return 'All kids';
        return c.assignedTo.map(id => kids.find(k => k.id === id)?.name || '?').join(', ');
    }
    return kids.find(k => k.id === c.assignedTo)?.name || '?';
}

function openModal(type, data = {}) {
    const defaultEmoji = (type === 'add-kid' || type === 'edit-kid') ? '😀' : '1';
    S.selectedEmoji    = data.emoji     || defaultEmoji;
    S.selectedColor    = data.color_key || 'blue';
    S.selectedSchedule = data.schedule  || 'daily';
    S.selectedDays     = data.days      ? [...data.days] : [];
    if (type === 'quick-task') {
        S.selectedKids = [];
    } else if (type === 'add-bonus') {
        S.selectedKids = 'all';
    } else if (type === 'edit-bonus') {
        const m = (cache.bonusMilestones || []).find(x => x.id === data.milestoneId);
        S.selectedKids = m ? (m.assignedTo === 'all' ? 'all' : Array.isArray(m.assignedTo) ? [...m.assignedTo] : [m.assignedTo]) : 'all';
    } else {
        S.selectedKids = !data.assignedTo || data.assignedTo === 'all' ? 'all'
                       : Array.isArray(data.assignedTo) ? [...data.assignedTo]
                       : [data.assignedTo];
    }
    S.modal = { type, data }; render();
}
function pickKidColor(key) { snapModalInputs(); S.selectedColor = key; render(); }
function closeModal() { S.modal = null; render(); }

function snapModalInputs() {
    if (!S.modal) return;
    const t = S.modal.type;
    if (t === 'add-chore' || t === 'edit-chore') {
        const n = document.getElementById('c-name');
        const d = document.getElementById('c-desc');
        const v = document.getElementById('c-val');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, description: d?.value, value: v?.value };
    }
    if (t === 'add-kid' || t === 'edit-kid') {
        const n = document.getElementById('k-name');
        const p = document.getElementById('k-pin');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, pin: p?.value };
    }
    if (t === 'quick-task') {
        const n = document.getElementById('qt-name');
        const v = document.getElementById('qt-val');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, value: v?.value };
    }
    if (t === 'manual-adjustment') {
        const a = document.getElementById('ma-amount');
        const d = document.getElementById('ma-desc');
        if (a) S.modal.data = { ...S.modal.data, amount: a.value, description: d?.value };
    }
    if (t === 'add-bonus' || t === 'edit-bonus') {
        const n = document.getElementById('bm-name');
        const th = document.getElementById('bm-threshold');
        const bo = document.getElementById('bm-bonus');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, threshold: th?.value, bonusAmount: bo?.value };
    }
}
function pickEmoji(em) { snapModalInputs(); S.selectedEmoji = em; render(); }
function setSchedule(s) { snapModalInputs(); S.selectedSchedule = s; render(); }
function setAllKids() { snapModalInputs(); S.selectedKids = 'all'; render(); }
function toggleKidAssignment(id) {
    snapModalInputs();
    if (S.selectedKids === 'all') { S.selectedKids = [id]; render(); return; }
    const arr = Array.isArray(S.selectedKids) ? [...S.selectedKids] : [];
    const i = arr.indexOf(id);
    if (i === -1) arr.push(id); else arr.splice(i, 1);
    S.selectedKids = arr.length === 0 ? 'all' : arr;
    render();
}
function toggleDay(d) {
    snapModalInputs();
    const i = S.selectedDays.indexOf(d);
    if (i === -1) S.selectedDays.push(d); else S.selectedDays.splice(i, 1);
    render();
}

async function doSignIn() {
    const email = document.getElementById('l-email')?.value?.trim();
    const pass  = document.getElementById('l-pass')?.value;
    const errEl = document.getElementById('l-err');
    if (!email || !pass) { if (errEl) errEl.textContent = 'Please enter email and password.'; return; }
    if (errEl) errEl.textContent = 'Signing in…';
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error && errEl) errEl.textContent = error.message;
}
async function doSignUp() {
    const email = document.getElementById('l-email')?.value?.trim();
    const pass  = document.getElementById('l-pass')?.value;
    const errEl = document.getElementById('l-err');
    if (!email || !pass) { if (errEl) errEl.textContent = 'Please enter email and password.'; return; }
    if (errEl) errEl.textContent = 'Creating account…';
    const { error } = await sb.auth.signUp({ email, password: pass });
    if (error) { if (errEl) errEl.textContent = error.message; }
    else { toast('Account created! Check your email to confirm, then sign in.'); }
}

function pRecon(db) {
    const sortedKids = [...db.kids].sort((a, b) => a.name.localeCompare(b.name));
    const saved = JSON.parse(localStorage.getItem('sprout_recon') || '{}');

    const rows = sortedKids.map(k => {
        const ac = kidAccent(k);
        const appBal = k.balance || 0;
        const bankVal = saved[k.id] !== undefined ? saved[k.id] : '';
        const bankBal = bankVal !== '' ? parseFloat(bankVal) : null;
        const diff = bankBal !== null ? bankBal - appBal : null;
        const diffColor = diff === null ? '#94a3b8' : diff === 0 ? '#16a34a' : diff > 0 ? '#f59e0b' : '#f43f5e';
        const diffLabel = diff === null ? '—' : diff === 0 ? '✓ Balanced' : diff > 0 ? `+${R(diff)} more in bank` : `${R(Math.abs(diff))} less in bank`;

        return `
        <div class="card" style="display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;gap:12px;padding:16px 20px">
          <!-- Kid -->
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:36px;height:36px;background:${ac.bg};border:1.5px solid ${ac.border};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${kidIcon(k)}</div>
            <div>
              <p style="font-family:var(--font-family);font-weight:800;font-size:14px;color:var(--color-text-primary)">${k.name}</p>
              <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary)">App balance</p>
            </div>
          </div>
          <!-- App balance + bank input -->
          <div style="display:flex;align-items:center;gap:10px">
            <div style="text-align:right;min-width:64px">
              <p style="font-family:var(--font-family);font-weight:800;font-size:15px;color:${ac.text}">${R(appBal)}</p>
              <p style="font-family:var(--font-family);font-size:10px;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em">In app</p>
            </div>
            <div style="color:#cbd5e1;font-size:18px;font-weight:300">↔</div>
            <div>
              <div style="display:flex;align-items:center;gap:4px;border:1.5px solid #e2e8f0;border-radius:10px;padding:6px 10px;background:white;width:110px">
                <span style="font-family:var(--font-family);font-size:13px;color:#94a3b8;flex-shrink:0">R</span>
                <input type="number" step="0.01" placeholder="0.00"
                  value="${bankVal}"
                  oninput="reconUpdate('${k.id}', this.value)"
                  style="font-family:var(--font-family);font-size:14px;font-weight:700;color:var(--color-text-primary);border:none;outline:none;width:100%;background:transparent"/>
              </div>
              <p style="font-family:var(--font-family);font-size:10px;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px;padding-left:2px">Bank balance</p>
            </div>
          </div>
          <!-- Difference -->
          <div id="recon-diff-${k.id}" style="text-align:right">
            <p style="font-family:var(--font-family);font-weight:800;font-size:15px;color:${diffColor}">${diffLabel}</p>
            <p style="font-family:var(--font-family);font-size:11px;color:var(--color-text-muted);margin-top:2px">${diff === null ? 'Enter bank balance' : diff === 0 ? 'App matches bank' : 'Bank vs app'}</p>
          </div>
        </div>`;
    }).join('');

    const allEntered = sortedKids.every(k => saved[k.id] !== undefined && saved[k.id] !== '');
    const totalApp = sortedKids.reduce((s, k) => s + (k.balance || 0), 0);
    const totalBank = allEntered ? sortedKids.reduce((s, k) => s + parseFloat(saved[k.id] || 0), 0) : null;
    const totalDiff = totalBank !== null ? totalBank - totalApp : null;

    const summary = allEntered ? `
        <div class="card" style="background:linear-gradient(132deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:center">
          <div>
            <p style="font-family:var(--font-family);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#15803d">Total in app</p>
            <p style="font-family:var(--font-family);font-size:22px;font-weight:900;color:#14532d">${R(totalApp)}</p>
          </div>
          <div>
            <p style="font-family:var(--font-family);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#15803d">Total in bank</p>
            <p style="font-family:var(--font-family);font-size:22px;font-weight:900;color:#14532d">${R(totalBank)}</p>
          </div>
          <div style="text-align:right">
            <p style="font-family:var(--font-family);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#15803d">Difference</p>
            <p style="font-family:var(--font-family);font-size:22px;font-weight:900;color:${totalDiff === 0 ? '#16a34a' : '#f43f5e'}">${totalDiff === 0 ? '✓ All balanced' : R(totalDiff)}</p>
          </div>
        </div>` : '';

    return `
    <div style="max-width:760px">
      <div style="margin-bottom:24px">
        <h2 style="font-family:var(--font-family);font-size:22px;font-weight:900;color:var(--color-text-primary);letter-spacing:-0.02em">Reconciliation</h2>
        <p style="font-family:var(--font-family);font-size:13px;color:var(--color-text-secondary);margin-top:4px">Enter each child's actual bank balance to see how it compares to the app. Differences highlight what may need adjusting.</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
        ${rows}
      </div>
      <div id="recon-summary">${summary}</div>
      <div style="margin-top:12px;text-align:right">
        <button onclick="reconClear()" style="font-family:var(--font-family);font-size:12px;color:var(--color-text-muted);text-decoration:underline;background:none;border:none;cursor:pointer">Clear all bank balances</button>
      </div>
    </div>`;
}

function reconUpdate(kidId, value) {
    const saved = JSON.parse(localStorage.getItem('sprout_recon') || '{}');
    saved[kidId] = value;
    localStorage.setItem('sprout_recon', JSON.stringify(saved));

    const db = DB.load();
    const kid = db.kids.find(k => k.id === kidId);
    if (!kid) return;

    // Update this kid's diff in-place
    const appBal = kid.balance || 0;
    const bankBal = value !== '' ? parseFloat(value) : null;
    const diff = (bankBal !== null && !isNaN(bankBal)) ? bankBal - appBal : null;
    const diffColor = diff === null ? '#94a3b8' : diff === 0 ? '#16a34a' : diff > 0 ? '#f59e0b' : '#f43f5e';
    const diffLabel = diff === null ? '—' : diff === 0 ? '✓ Balanced' : diff > 0 ? `+${R(diff)} more in bank` : `${R(Math.abs(diff))} less in bank`;
    const diffSub = diff === null ? 'Enter bank balance' : diff === 0 ? 'App matches bank' : 'Bank vs app';
    const el = document.getElementById(`recon-diff-${kidId}`);
    if (el) el.innerHTML = `<p style="font-family:var(--font-family);font-weight:800;font-size:15px;color:${diffColor}">${diffLabel}</p><p style="font-family:var(--font-family);font-size:11px;color:var(--color-text-muted);margin-top:2px">${diffSub}</p>`;

    // Update summary in-place
    const sortedKids = [...db.kids].sort((a, b) => a.name.localeCompare(b.name));
    const allEntered = sortedKids.every(k => saved[k.id] !== undefined && saved[k.id] !== '');
    const summaryEl = document.getElementById('recon-summary');
    if (summaryEl) {
        if (allEntered) {
            const totalApp = sortedKids.reduce((s, k) => s + (k.balance || 0), 0);
            const totalBank = sortedKids.reduce((s, k) => s + parseFloat(saved[k.id] || 0), 0);
            const totalDiff = totalBank - totalApp;
            summaryEl.innerHTML = `<div class="card" style="background:linear-gradient(132deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:center"><div><p style="font-family:var(--font-family);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#15803d">Total in app</p><p style="font-family:var(--font-family);font-size:22px;font-weight:900;color:#14532d">${R(totalApp)}</p></div><div><p style="font-family:var(--font-family);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#15803d">Total in bank</p><p style="font-family:var(--font-family);font-size:22px;font-weight:900;color:#14532d">${R(totalBank)}</p></div><div style="text-align:right"><p style="font-family:var(--font-family);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#15803d">Difference</p><p style="font-family:var(--font-family);font-size:22px;font-weight:900;color:${totalDiff === 0 ? '#16a34a' : '#f43f5e'}">${totalDiff === 0 ? '✓ All balanced' : R(totalDiff)}</p></div></div>`;
        } else {
            summaryEl.innerHTML = '';
        }
    }
}

function reconClear() {
    localStorage.removeItem('sprout_recon');
    render();
}

function pOverview(db) {
    const pending = db.completions.filter(c => !c.approved && !c.rejected && !c.missed);
    const sortedKids = [...db.kids].sort((a, b) => a.name.localeCompare(b.name));
    const kidRows = sortedKids.map((k, i) => {
        const ac = kidAccent(k);
        const kBalance = k.balance || 0;
        return `
        <div class="card flex items-center gap-3">
          <div style="width:40px;height:40px;background:${ac.bg};border:1.5px solid ${ac.border};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${kidIcon(k)}</div>
          <div class="flex-1">
            <p style="font-family:var(--font-family);font-weight:700;color:var(--color-text-primary);font-size:14px">${k.name}</p>
            <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary)">Weekly potential: ${R(weeklyPossible(db, k.id))}</p>
          </div>
          <div class="text-right">
            <p style="font-family:var(--font-family);font-weight:800;color:${ac.text};font-size:15px">${R(kBalance)}</p>
            <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:6px">
              <button onclick="openModal('payout',{kidId:'${k.id}'})" class="chip-btn">Pay out</button>
              <button onclick="openModal('manual-adjustment',{kidId:'${k.id}',adjustType:'add'})" class="chip-btn">Adjust</button>
            </div>
          </div>
        </div>`;
    }).join('');

    const pendingByKid = sortedKids
        .map(k => ({ kid: k, comps: pending.filter(c => c.kidId === k.id) }))
        .filter(g => g.comps.length > 0);
    const pendingRows = pendingByKid.map(({ kid: k, comps }) => {
        const ac = kidAccent(k);
        const total = comps.reduce((s, c) => {
            const chore = db.chores.find(x => x.id === c.choreId);
            return s + (chore?.value || 0);
        }, 0);
        const rows = comps.map(c => {
            const chore = db.chores.find(x => x.id === c.choreId);
            return `
            <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:var(--color-background)">
              <div class="flex-1 min-w-0">
                <p style="font-family:var(--font-family);font-weight:700;color:var(--color-text-primary);font-size:13px">${chore?.name || 'Deleted chore'}</p>
                <p style="font-family:var(--font-family);font-size:11px;color:var(--color-text-secondary);margin-top:1px">${R(chore?.value)} · ${dateStr(c.completedAt)}</p>
              </div>
              <button onclick="approveChore('${c.id}')" title="Approve" style="background:var(--color-green-100);color:var(--color-green-700);padding:6px 11px;border-radius:8px;border:none;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center">${uiIcon('check', 13, 3)}</button>
              <button onclick="rejectChore('${c.id}')" title="Reject" style="background:var(--color-coral-bg);color:var(--color-coral-text);padding:6px 11px;border-radius:8px;border:none;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center">${uiIcon('cross', 13, 3)}</button>
            </div>`;
        }).join('');
        return `
        <div class="card" style="padding:0;overflow:hidden">
          <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:${ac.bg};border-bottom:1.5px solid ${ac.border}">
            <div style="width:32px;height:32px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1.5px solid ${ac.border}">${kidIcon(k)}</div>
            <div class="flex-1">
              <p style="font-family:var(--font-family);font-weight:800;color:${ac.text};font-size:13px">${k.name}</p>
              <p style="font-family:var(--font-family);font-size:11px;color:${ac.text};opacity:0.75">${comps.length} task${comps.length > 1 ? 's' : ''} · ${R(total)} total</p>
            </div>
            <button onclick="approveAllForKid('${k.id}')" style="background:${ac.header};color:white;padding:6px 12px;border-radius:8px;font-family:var(--font-family);font-size:11px;font-weight:800;border:none;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;gap:5px">${uiIcon('check', 11, 3)} Approve all</button>
          </div>
          <div style="display:flex;flex-direction:column;gap:2px;padding:6px">
            ${rows}
          </div>
        </div>`;
    }).join('');

    const totalWeekly   = db.kids.reduce((s, k) => s + weeklyPossible(db, k.id), 0);
    const totalEarned   = db.kids.reduce((s, k) => s + weeklyEarned(db, k.id), 0);
    const totalBalances = db.kids.reduce((s, k) => s + (k.balance || 0), 0);
    const pendingValue  = pending.reduce((s, c) => { const ch = db.chores.find(x => x.id === c.choreId); return s + (ch?.value || 0); }, 0);
    const weekPct       = totalWeekly > 0 ? Math.min(100, Math.round(totalEarned / totalWeekly * 100)) : 0;
    const weeklyCard  = db.kids.length === 0 ? '' : `
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
      <div class="stat-card">
        <p class="pr-section-label">Earned this week</p>
        <p style="font-family:var(--font-family);font-size:24px;font-weight:800;color:var(--color-green-700);margin-top:4px">${R(totalEarned)}</p>
        <div style="background:var(--color-green-100);border-radius:99px;height:6px;overflow:hidden;margin-top:10px">
          <div style="background:var(--color-green-500);width:${weekPct}%;height:100%;border-radius:99px"></div>
        </div>
      </div>
      <div class="stat-card">
        <p class="pr-section-label">Possible this week</p>
        <p style="font-family:var(--font-family);font-size:24px;font-weight:800;color:var(--color-text-primary);margin-top:4px">${R(totalWeekly)}</p>
        <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary);margin-top:8px">Across ${db.kids.length} kid${db.kids.length === 1 ? '' : 's'}</p>
      </div>
      <div class="stat-card">
        <p class="pr-section-label">Pending approvals</p>
        <p style="font-family:var(--font-family);font-size:24px;font-weight:800;color:var(--color-gold-800);margin-top:4px">${pending.length}</p>
        <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary);margin-top:8px">Worth ${R(pendingValue)}</p>
      </div>
      <div class="stat-card">
        <p class="pr-section-label">Total balances</p>
        <p style="font-family:var(--font-family);font-size:24px;font-weight:800;color:var(--color-text-primary);margin-top:4px">${R(totalBalances)}</p>
        <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary);margin-top:8px">Held for the kids</p>
      </div>
    </div>`;

    const missedClearedAt = localStorage.getItem('sprout_missed_cleared_at') || '';
    const missed = db.completions.filter(c => c.missed && (!missedClearedAt || (c.dueDate || '') > missedClearedAt)).sort((a,b) => b.dueDate?.localeCompare(a.dueDate));
    const missedRows = missed.map(c => {
        const chore = db.chores.find(x => x.id === c.choreId);
        const kid   = db.kids.find(x => x.id === c.kidId);
        const d = new Date(c.dueDate + 'T12:00:00');
        const label = d.toLocaleDateString('en-ZA', { weekday: 'short', day: 'numeric', month: 'short' });
        return `
        <div class="card flex items-center gap-3" style="border-left:3px solid #fca5a5">
          <div class="flex-1">
            <p style="font-family:var(--font-family);font-weight:700;color:var(--color-text-primary);font-size:14px">${chore?.name || 'Deleted chore'}</p>
            <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary)">${kid?.name || '?'} · ${label} · ${R(chore?.value || 0)} not earned</p>
          </div>
          <span style="font-family:var(--font-family);font-size:11px;font-weight:700;color:#f43f5e;background:#fff1f2;padding:4px 10px;border-radius:20px">Missed</span>
        </div>`;
    }).join('');

    return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button onclick="openModal('quick-task')" class="btn-primary" style="width:auto;padding:9px 18px;font-size:13px;display:flex;align-items:center;gap:6px">
        ${uiIcon('zap', 14)}
        Quick Chore
      </button>
    </div>
    ${weeklyCard}
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-2">
      <div>
        <p class="pr-section-label mb-3">Balances</p>
        <div class="flex flex-col gap-2">
          ${db.kids.length === 0
            ? `<div class="card text-center py-6" style="color:var(--color-text-muted);font-family:var(--font-family);font-size:14px">No kids added yet.</div>`
            : kidRows}
        </div>
      </div>
      <div>
        <p class="pr-section-label mb-3">Pending Approvals ${pending.length ? `<span class="badge ml-1">${pending.length}</span>` : ''}</p>
        <div class="flex flex-col gap-2">
          ${pending.length === 0
            ? `<div class="card text-center py-6" style="color:var(--color-text-muted);font-family:var(--font-family);font-size:14px">Nothing waiting for approval 🎉</div>`
            : pendingRows}
        </div>
      </div>
    </div>
    ${missed.length === 0 ? '' : `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <p class="pr-section-label" style="margin-bottom:0">Missed Chores <span style="font-family:var(--font-family);font-size:11px;font-weight:600;color:var(--color-text-muted)">(last 7 days)</span></p>
          <button onclick="clearMissedChores()" style="font-family:var(--font-family);font-size:12px;font-weight:700;color:var(--color-text-muted);background:none;border:1.5px solid var(--color-border);border-radius:8px;padding:4px 10px;cursor:pointer" onmouseenter="this.style.color='#374151'" onmouseleave="this.style.color='var(--color-text-muted)'">Clear all</button>
        </div>
        <div class="flex flex-col gap-2">${missedRows}</div>
      </div>
      <div></div>
    </div>`}`;
}

function pBonuses(db) {
    const milestones = db.bonusMilestones || [];
    const bonusHistory = db.transactions
        .filter(t => t.type === 'bonus')
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .slice(0, 20);

    const milestoneCards = milestones.map(m => {
        const affectedKids = db.kids.filter(k =>
            m.assignedTo === 'all' || (Array.isArray(m.assignedTo) && m.assignedTo.includes(k.id))
        );
        const kidRows = affectedKids.map(k => {
            const claim = (m.claimedBy || []).find(c => c.kidId === k.id);
            const ac = kidAccent(k);
            const claimDate = claim ? new Date(claim.claimedAt).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' }) : null;
            return `
            <div style="display:flex;align-items:center;gap:8px;padding:5px 0">
              <div style="width:24px;height:24px;background:${ac.bg};border:1px solid ${ac.border};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${kidIcon(k)}</div>
              <span style="font-family:var(--font-family);font-size:12px;font-weight:600;color:var(--color-text-primary);flex:1">${k.name}</span>
              ${claim
                ? `<span style="font-family:var(--font-family);font-size:10px;font-weight:700;background:#dcfce7;color:#16a34a;padding:3px 9px;border-radius:99px">✓ Claimed ${claimDate}</span>`
                : `<span style="font-family:var(--font-family);font-size:10px;font-weight:600;color:var(--color-text-muted);background:var(--color-background);padding:3px 9px;border-radius:99px">Not reached</span>`}
            </div>`;
        }).join('');

        return `
        <div class="card">
          <div style="display:flex;align-items:flex-start;gap:12px">
            <div style="width:44px;height:44px;background:#fff7ed;border:1.5px solid #fed7aa;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3 L13.8 8.2 L19.3 8.2 L14.9 11.5 L16.6 16.8 L12 13.5 L7.4 16.8 L9.1 11.5 L4.7 8.2 L10.2 8.2Z" fill="#fb923c"/><path d="M20 3 L20.5 4.5 L22 5 L20.5 5.5 L20 7 L19.5 5.5 L18 5 L19.5 4.5Z" fill="#fbbf24"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <p style="font-family:var(--font-family);font-weight:800;color:var(--color-text-primary);font-size:14px">${m.name || 'Balance Milestone'}</p>
              <div style="display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap">
                <span style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary)">Reach</span>
                <span style="font-family:var(--font-family);font-size:15px;font-weight:800;color:var(--color-text-primary)">${R(m.threshold)}</span>
                <span style="color:var(--color-text-muted);font-size:14px">→</span>
                <span style="font-family:var(--font-family);font-size:15px;font-weight:800;color:var(--color-green-600)">+${R(m.bonusAmount)}</span>
                <span style="font-family:var(--font-family);font-size:11px;font-weight:700;color:#f97316;background:#fff7ed;padding:2px 8px;border-radius:99px">bonus</span>
              </div>
            </div>
            <div style="display:flex;gap:2px;flex-shrink:0">
              <button onclick="openModal('edit-bonus',{milestoneId:'${m.id}'})" title="Edit" class="icon-btn">${uiIcon('pencil', 15)}</button>
              <button onclick="deleteBonusMilestone('${m.id}')" title="Delete" class="icon-btn danger">${uiIcon('trash', 15)}</button>
            </div>
          </div>
          ${affectedKids.length > 0 ? `
          <div style="border-top:1px solid var(--color-border);margin-top:12px;padding-top:8px">
            ${kidRows}
          </div>` : ''}
        </div>`;
    }).join('');

    const historyRows = bonusHistory.map(t => {
        const kid = db.kids.find(k => k.id === t.kidId);
        const ac = kid ? kidAccent(kid) : { bg: '#f1f5f9', border: '#e2e8f0', text: '#64748b' };
        return `
        <div class="card flex items-center gap-3">
          ${kid ? `<div style="width:36px;height:36px;background:${ac.bg};border:1.5px solid ${ac.border};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${kidIcon(kid)}</div>` : ''}
          <div class="flex-1 min-w-0">
            <p style="font-family:var(--font-family);font-weight:700;color:var(--color-text-primary);font-size:13px">${t.description}</p>
            <p style="font-family:var(--font-family);font-size:11px;color:var(--color-text-secondary);margin-top:1px">${kid?.name || '?'} · ${dateStr(t.createdAt)}</p>
          </div>
          <p style="font-family:var(--font-family);font-weight:800;color:var(--color-green-600);font-size:14px;flex-shrink:0">+${R(t.amount)}</p>
        </div>`;
    }).join('');

    return `
    <div class="flex justify-between items-center mb-2">
      <p class="pr-section-label">Bonus Milestones</p>
      <button onclick="openModal('add-bonus')" class="btn-primary" style="width:auto;padding:8px 16px;font-size:13px">+ Add Milestone</button>
    </div>
    <p style="font-family:var(--font-family);font-size:13px;color:var(--color-text-secondary);margin-bottom:20px">When a kid's balance reaches a threshold, they automatically receive the bonus — once per milestone.</p>
    ${milestones.length === 0
        ? `<div class="card text-center py-12" style="color:var(--color-text-muted);font-family:var(--font-family);font-size:14px">🌟<br><br>No milestones yet.<br>Add one to reward your kids for saving!</div>`
        : `<div class="flex flex-col gap-3 mb-6">${milestoneCards}</div>`}
    ${bonusHistory.length > 0 ? `
    <div class="mt-2">
      <p class="pr-section-label mb-3">Bonus History</p>
      <div class="flex flex-col gap-2">${historyRows}</div>
    </div>` : ''}`;
}

            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">

                ${tier.stage === 4 ? `<span style="font-family:var(--font-family);font-size:10px;font-weight:700;background:var(--color-green-100);color:var(--color-green-700);padding:2px 8px;border-radius:99px">TOP TIER 🏆</span>` : ''}

              <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary)">${TREE_STAGES[tier.stage].description}</p>
              <p style="font-family:var(--font-family);font-size:12px;font-weight:700;color:var(--color-green-600);margin-top:3px">${tier.range}</p>
            </div>
          </div>`).join('')}
        </div>

        <!-- Threshold editors -->
        <p style="font-family:var(--font-family);font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:12px">Set Thresholds</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">

            { key:'t3', label:'Young Tree → Money Tree', val: t.t3 },

          <div>

            <div style="position:relative">
              <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--color-text-secondary);font-size:14px;line-height:1;pointer-events:none">${currSymbol()}</span>

function vKidPin() {
    const db = DB.load();
    const kid = db.kids.find(k => k.id === S.pinKidId);
    const ac = kidAccent(kid);
    const dots = [0,1,2,3].map(i =>
        `<div class="pin-dot ${S.pin.length > i ? 'filled' : ''}" style="border-color:${ac.header};${S.pin.length>i?'background:'+ac.header:''}"></div>`).join('');
    const keys = [1,2,3,4,5,6,7,8,9,null,0,'⌫'];
    const pad = keys.map(k => k === null

function pinPress(k) {
    if (k === '⌫') { S.pin = S.pin.slice(0,-1); render(); return; }

}
function checkPin() {
    const db = DB.load();

// ─── ACTIONS ─────────────────────────────────────────────────────
async function addKid() {
    const name      = document.getElementById('k-name').value.trim();
    const pin       = document.getElementById('k-pin').value.trim();
    const emoji     = S.selectedEmoji || '😀';
    const color_key = S.selectedColor || 'blue';
    if (!name)                 return toast('⚠️ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits (e.g. 1234).');
    const id = uid();
    const { error } = await sb.from('kids').insert({ id, user_id: currentUser.id, name, pin, emoji, color_key, balance: 0 });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.kids.push({ id, name, pin, emoji, color_key, balance: 0 });
    closeModal(); toast(`${name} added! 🎉`);
}
function editKid(id) {
    const k = cache.kids.find(x => x.id === id);
    if (k) openModal('edit-kid', { ...k });
}
async function saveKid(id) {
    const name      = document.getElementById('k-name').value.trim();
    const pin       = document.getElementById('k-pin').value.trim();
    const emoji     = S.selectedEmoji || '😀';
    const color_key = S.selectedColor || 'blue';
    if (!name)                 return toast('⚠️ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits (e.g. 1234).');
    const { error } = await sb.from('kids').update({ name, pin, emoji, color_key }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save.');
    const k = cache.kids.find(x => x.id === id);
    if (k) { k.name = name; k.pin = pin; k.emoji = emoji; k.color_key = color_key; }
    closeModal(); toast('Saved!');
}
function deleteKid(id) {
    const k = cache.kids.find(x => x.id === id);
    openModal('confirm-delete', { msg: `Remove ${k?.name}? All their data will be deleted.`, onConfirm: `doDeleteKid('${id}')` });
}
async function doDeleteKid(id) {
    const { error } = await sb.from('kids').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.kids         = cache.kids.filter(x => x.id !== id);
    cache.completions  = cache.completions.filter(x => x.kidId !== id);
    cache.transactions = cache.transactions.filter(x => x.kidId !== id);
    closeModal(); render();
}

async function addChore() {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || '⭐';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('⚠️ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('⚠️ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('⚠️ Please select at least one kid.');
    const id = uid();
    const { error } = await sb.from('chores').insert({ id, user_id: currentUser.id, name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.chores.push({ id, name, description: desc, value: val, assignedTo, emoji, schedule, days });
    closeModal(); toast('Chore added!');
}
function editChore(id) {
    const c = cache.chores.find(x => x.id === id);
    if (c) openModal('edit-chore', { ...c });
}
async function saveChore(id) {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || '⭐';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('⚠️ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('⚠️ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('⚠️ Please select at least one kid.');
    const { error } = await sb.from('chores').update({ name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save.');
    const c = cache.chores.find(x => x.id === id);
    if (c) { c.name = name; c.description = desc; c.value = val; c.assignedTo = assignedTo; c.emoji = emoji; c.schedule = schedule; c.days = days; }
    closeModal(); toast('Saved!');
}
function deleteChore(id) {
    openModal('confirm-delete', { msg: 'Delete this chore?', onConfirm: `doDeleteChore('${id}')` });
}
function setAdjustType(t) {
    snapModalInputs();
    S.modal.data = { ...S.modal.data, adjustType: t };
    render();
}
async function saveManualAdjustment(kidId) {
    const amount = parseFloat(document.getElementById('ma-amount').value) || 0;
    const desc   = document.getElementById('ma-desc').value.trim();
    const isAdd  = (S.modal.data.adjustType || 'add') === 'add';
    if (amount <= 0) return toast('⚠️ Please enter a valid amount.');
    if (!desc)       return toast('⚠️ Please enter a reason.');
    const kid = cache.kids.find(x => x.id === kidId);
    if (!kid) return;
    const delta      = isAdd ? amount : -amount;
    const newBalance = (kid.balance || 0) + delta;
    const id         = uid();
    const createdAt  = new Date().toISOString();
    const { error } = await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save. Check your connection.');
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: delta, type: 'manual', description: desc, created_at: createdAt });
    kid.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: delta, type: 'manual', description: desc, createdAt });
    closeModal();
    toast(isAdd ? `${R(amount)} added to ${kid.name}'s balance.` : `${R(amount)} deducted from ${kid.name}'s balance.`);
    if (isAdd) await checkBonusMilestones(kidId, newBalance);
}
function pickQuickTaskKid(id) {
    snapModalInputs();
    if (S.selectedKids === 'all') { S.selectedKids = [id]; render(); return; }
    const arr = Array.isArray(S.selectedKids) ? [...S.selectedKids] : [];
    const i = arr.indexOf(id);
    if (i === -1) arr.push(id); else arr.splice(i, 1);
    S.selectedKids = arr;
    render();
}
async function addQuickTask() {
    const name      = document.getElementById('qt-name').value.trim();
    const val       = parseFloat(document.getElementById('qt-val').value) || 0;
    const assignedTo = S.selectedKids;
    if (!name) return toast('⚠️ Please enter a task name.');
    if (!assignedTo || (Array.isArray(assignedTo) && assignedTo.length === 0)) return toast('⚠️ Please select at least one kid.');
    const expiresOn = toLocalDateStr(new Date());
    const id = uid();
    const { error } = await sb.from('chores').insert({ id, user_id: currentUser.id, name, description: '', value: val, assigned_to: assignedTo, emoji: '⭐', schedule: 'daily', days: [], one_off: true, expires_on: expiresOn });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.chores.push({ id, name, description: '', value: val, assignedTo, emoji: '⭐', schedule: 'daily', days: [], oneOff: true, expiresOn });
    closeModal(); toast('Quick task assigned! 🎯');
}
async function doDeleteChore(id) {
    const { error } = await sb.from('chores').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.chores = cache.chores.filter(x => x.id !== id);
    closeModal(); render();
}

function pickBonusKid(id) {
    snapModalInputs();
    if (S.selectedKids === 'all') { S.selectedKids = [id]; render(); return; }
    const arr = Array.isArray(S.selectedKids) ? [...S.selectedKids] : [];
    const i = arr.indexOf(id);
    if (i === -1) arr.push(id); else arr.splice(i, 1);
    S.selectedKids = arr;
    render();
}
async function saveBonusMilestone(editId) {
    const name      = document.getElementById('bm-name').value.trim();
    const threshold = parseFloat(document.getElementById('bm-threshold').value) || 0;
    const bonusAmt  = parseFloat(document.getElementById('bm-bonus').value) || 0;
    const assignedTo = S.selectedKids;
    if (threshold <= 0) return toast('⚠️ Please enter a balance target.');
    if (bonusAmt  <= 0) return toast('⚠️ Please enter a bonus amount.');
    if (!assignedTo || (Array.isArray(assignedTo) && assignedTo.length === 0)) return toast('⚠️ Please select at least one kid.');
    if (editId && editId !== 'null') {
        const m = cache.bonusMilestones.find(x => x.id === editId);
        if (!m) return;
        await sb.from('bonus_milestones').update({ name, threshold, bonus_amount: bonusAmt, assigned_to: assignedTo }).eq('id', editId).eq('user_id', currentUser.id);
        m.name = name; m.threshold = threshold; m.bonusAmount = bonusAmt; m.assignedTo = assignedTo;
        closeModal(); toast('Milestone updated.');
    } else {
        const id = uid(); const createdAt = new Date().toISOString();
        const { error } = await sb.from('bonus_milestones').insert({ id, user_id: currentUser.id, name, threshold, bonus_amount: bonusAmt, assigned_to: assignedTo, claimed_by: [], created_at: createdAt });
        if (error) return toast('❌ ' + (error.message || 'Could not save.'));
        cache.bonusMilestones.push({ id, name, threshold, bonusAmount: bonusAmt, assignedTo, claimedBy: [], createdAt });
        closeModal(); toast('Milestone added! 🌟');
    }
}
async function deleteBonusMilestone(id) {
    openModal('confirm-delete', { msg: 'Delete this bonus milestone? Kids who already claimed it keep their bonus.', onConfirm: `doDeleteBonusMilestone('${id}')` });
}
async function doDeleteBonusMilestone(id) {
    const { error } = await sb.from('bonus_milestones').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.bonusMilestones = cache.bonusMilestones.filter(x => x.id !== id);
    closeModal(); render();
}
async function checkBonusMilestones(kidId, newBalance) {
    const eligible = (cache.bonusMilestones || []).filter(m => {
        const applies = m.assignedTo === 'all' || (Array.isArray(m.assignedTo) && m.assignedTo.includes(kidId));
        const claimed = (m.claimedBy || []).some(c => c.kidId === kidId);
        return applies && !claimed && newBalance >= m.threshold;
    });
    if (!eligible.length) return;
    const kid = cache.kids.find(k => k.id === kidId);
    if (!kid) return;
    const now = new Date().toISOString();
    let bonusTotal = 0;
    const txInserts = [];
    for (const m of eligible) {
        const newClaimed = [...(m.claimedBy || []), { kidId, claimedAt: now }];
        await sb.from('bonus_milestones').update({ claimed_by: newClaimed }).eq('id', m.id).eq('user_id', currentUser.id);
        m.claimedBy = newClaimed;
        bonusTotal += m.bonusAmount;
        const txId = uid();
        txInserts.push({ id: txId, user_id: currentUser.id, kid_id: kidId, amount: m.bonusAmount, type: 'bonus', description: `Bonus: ${m.name || 'Balance milestone'} (${R(m.threshold)})`, created_at: now });
        cache.transactions.push({ id: txId, kidId, amount: m.bonusAmount, type: 'bonus', description: `Bonus: ${m.name || 'Balance milestone'} (${R(m.threshold)})`, createdAt: now });
    }
    if (bonusTotal > 0) {
        const finalBalance = kid.balance + bonusTotal;
        await sb.from('kids').update({ balance: finalBalance }).eq('id', kidId).eq('user_id', currentUser.id);
        kid.balance = finalBalance;
        await sb.from('transactions').insert(txInserts);
        toast(`🎉 ${kid.name} earned ${eligible.length > 1 ? eligible.length + ' bonuses' : 'a bonus'}: +${R(bonusTotal)}!`);
        render();
    }
}

async function approveChore(cid) {
    const comp  = cache.completions.find(x => x.id === cid);
    if (!comp) return;
    const chore = cache.chores.find(x => x.id === comp.choreId);
    const kid   = cache.kids.find(x => x.id === comp.kidId);
    await sb.from('completions').update({ approved: true }).eq('id', cid).eq('user_id', currentUser.id);
    comp.approved = true;
    if (chore && kid) {
        const newBalance = (kid.balance || 0) + chore.value;
        const txId = uid();
        const txCreatedAt = new Date().toISOString();
        await sb.from('kids').update({ balance: newBalance }).eq('id', kid.id).eq('user_id', currentUser.id);
        await sb.from('transactions').insert({ id: txId, user_id: currentUser.id, kid_id: kid.id, amount: chore.value, type: 'chore', description: chore.name, created_at: txCreatedAt });
        kid.balance = newBalance;
        cache.transactions.push({ id: txId, kidId: kid.id, amount: chore.value, type: 'chore', description: chore.name, createdAt: txCreatedAt });
        await checkBonusMilestones(kid.id, newBalance);
    }
    toast(`✓ Approved! ${R(chore?.value)} added to ${kid?.name}.`);
}
async function approveAllForKid(kidId) {
    const kid   = cache.kids.find(x => x.id === kidId);
    if (!kid) return;
    const comps = cache.completions.filter(c => c.kidId === kidId && !c.approved && !c.rejected && !c.missed);
    if (!comps.length) return;
    const ids = comps.map(c => c.id);
    await sb.from('completions').update({ approved: true }).in('id', ids).eq('user_id', currentUser.id);
    const now = new Date().toISOString();
    const txInserts = [];
    let totalAdded = 0;
    comps.forEach(comp => {
        comp.approved = true;
        const chore = cache.chores.find(x => x.id === comp.choreId);
        if (chore) {
            totalAdded += chore.value;
            txInserts.push({ id: uid(), user_id: currentUser.id, kid_id: kidId, amount: chore.value, type: 'chore', description: chore.name, created_at: now });
        }
    });
    if (totalAdded > 0) {
        const newBalance = (kid.balance || 0) + totalAdded;
        await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
        kid.balance = newBalance;
        await checkBonusMilestones(kidId, newBalance);
    }
    if (txInserts.length) {
        await sb.from('transactions').insert(txInserts);
        txInserts.forEach(t => cache.transactions.push({ id: t.id, kidId, amount: t.amount, type: t.type, description: t.description, createdAt: t.created_at }));
    }
    toast(`✓ All approved! ${R(totalAdded)} added to ${kid.name}.`);
    render();
}
async function rejectChore(cid) {
    await sb.from('completions').update({ rejected: true }).eq('id', cid).eq('user_id', currentUser.id);
    const c = cache.completions.find(x => x.id === cid);
    if (c) c.rejected = true;
    render();
}
async function markDone(choreId) {
    const id = uid();
    const now = new Date();
    const completedAt = now.toISOString();
    const dueDate = toLocalDateStr(now);
    const { error } = await sb.from('completions').insert({ id, user_id: currentUser.id, chore_id: choreId, kid_id: S.kidId, completed_at: completedAt, due_date: dueDate, approved: false, rejected: false, missed: false });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.completions.push({ id, choreId, kidId: S.kidId, completedAt, dueDate, approved: false, rejected: false, missed: false });
    toast('Marked as done! Waiting for parent to approve. ⏳');
}
async function recordPayout() {
    const kidId  = document.getElementById('po-kid').value;
    const amount = parseFloat(document.getElementById('po-amount').value) || 0;
    if (!kidId)    return toast('⚠️ Please select a kid.');
    if (amount<=0) return toast('⚠️ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    document.getElementById('po-kid').value = '';
    document.getElementById('po-amount').value = '';
    toast(`${R(amount)} payout recorded for ${k.name}.`);
}
async function doModalPayout(kidId) {
    const amount = parseFloat(document.getElementById('m-po-amt').value) || 0;
    if (amount<=0) return toast('⚠️ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    closeModal(); toast(`${R(amount)} payout recorded for ${k.name}.`);
}

async function saveTreeThresholdsFromUI() {
    const vals = ['t1','t2','t3','t4'].map(k => parseFloat(document.getElementById('thresh-'+k)?.value));
    if (vals.some(v => isNaN(v) || v <= 0)) return toast('⚠️ All thresholds must be positive numbers.');
    if (vals[0] >= vals[1] || vals[1] >= vals[2] || vals[2] >= vals[3])
        return toast('⚠️ Each threshold must be higher than the previous one.');
    const ok = await saveTreeThresholds({ t1: vals[0], t2: vals[1], t3: vals[2], t4: vals[3] });
    if (ok) { render(); toast('🌱 Tree thresholds saved!'); }
}
async function resetTreeThresholds() {
    const ok = await saveTreeThresholds({ ...DEFAULT_TREE_THRESHOLDS });
    if (ok) { render(); toast('Reset to defaults.'); }
}

function clearMissedChores() {
    const latest = cache.completions.filter(c => c.missed).map(c => c.dueDate || '').sort().pop() || toLocalDateStr(new Date());
    localStorage.setItem('sprout_missed_cleared_at', latest);
    render();
}

function saveCurrency(code) {
    localStorage.setItem('sprout_currency', code);
    render();
    toast('Currency updated!');
    sb.auth.updateUser({ data: { currency: code } }).then(({ data }) => {
        if (data?.user) currentUser = data.user;
    });
}

async function saveParentPin() {
    const pin = document.getElementById('pp-pin').value.trim();
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits.');
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: pin } });
    if (error) return toast('❌ Could not save PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN saved! 🔐');
}
async function removeParentPin() {
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: null } });
    if (error) return toast('❌ Could not remove PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN removed.');
}

// ─── RENDER ──────────────────────────────────────────────────────
let _logoCyclerTimer = null;
function startLogoCycler() {
    if (_logoCyclerTimer) { clearInterval(_logoCyclerTimer); _logoCyclerTimer = null; }
    const el = document.getElementById('logo-cycler');
    if (!el) return;
    const icons = [0, 1, 2, 3, 4].map(i => treeStageSVG(i, 108));
    let idx = 0;
    el.innerHTML = `<div class="logo-icon-inner">${icons[0]}</div>`;
    _logoCyclerTimer = setInterval(() => {
        const c = document.getElementById('logo-cycler');
        if (!c) { clearInterval(_logoCyclerTimer); _logoCyclerTimer = null; return; }
        const inner = c.querySelector('.logo-icon-inner');
        if (inner) inner.style.animation = 'logoIconExit 0.35s ease-in forwards';
        setTimeout(() => {
            const c2 = document.getElementById('logo-cycler');
            if (!c2) return;
            idx = (idx + 1) % icons.length;
            c2.innerHTML = `<div class="logo-icon-inner">${icons[idx]}</div>`;
        }, 320);
    }, 2800);
}


function render() {
    const toastHtml = S.toast
        ? `<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;font-family:var(--font-family);font-size:14px;font-weight:600;padding:10px 20px;border-radius:var(--radius-full);box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:99;max-width:320px;text-align:center">${S.toast}</div>`
        : '';
    if (!currentUser) {
        document.getElementById('app').innerHTML = vLogin() + toastHtml;
        setTimeout(startLogoCycler, 50);
        return;
    }
    const views = { home: vHome, parent: vParent, 'kid-pin': vKidPin, kid: vKid, 'parent-pin': vParentPin };
    const html  = (views[S.view] || vHome)();
    document.getElementById('app').innerHTML = html + renderModal() + toastHtml;
    if (S.view === 'home' || !S.view) setTimeout(startLogoCycler, 50);
}

initApp();
