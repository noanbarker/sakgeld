    <style>

      :root {

        --color-green-50:    #f0fdf4;
        --color-green-100:   #dcfce7;
        --color-green-200:   #bbf7d0;
        --color-green-300:   #86efac;
        --color-green-400:   #4ade80;
        --color-green-500:   #22c55e;
        --color-green-600:   #16a34a;
        --color-green-700:   #15803d;
        --color-green-800:   #14532d;
        --color-green-900:   #052e16;
        /* Gold (coins/earnings) */
        --color-gold-50:     #fef9c3;
        --color-gold-200:    #fde68a;
        --color-gold-400:    #fbbf24;
        --color-gold-800:    #b45309;
        --color-gold-900:    #78350f;
        /* Coral (accent / second kid) */
        --color-coral-100:   #ffe4e6;
        --color-coral-300:   #fca5a5;
        --color-coral-500:   #f43f5e;
        --color-coral-800:   #be123c;
        /* Blue (third kid / info) */
        --color-blue-100:    #dbeafe;
        --color-blue-300:    #93c5fd;
        --color-blue-600:    #2563eb;
        --color-blue-800:    #1e40af;
        /* Semantic aliases kept for backward compat */
        --color-blue:        #2563eb;
        --color-blue-light:  #60a5fa;
        --color-blue-pale:   #bfdbfe;
        --color-blue-bg:     #dbeafe;
        --color-blue-border: #93c5fd;
        --color-blue-text:   #1e40af;
        --color-blue-dark:   #1d4ed8;
        --color-green:       #16a34a;
        --color-green-bg:    #dcfce7;
        --color-green-border:#86efac;
        --color-green-text:  #15803d;
        --color-coral:       #f43f5e;
        --color-coral-bg:    #ffe4e6;
        --color-coral-border:#fca5a5;
        --color-coral-text:  #be123c;
        --color-purple:      #7c3aed;
        /* Neutrals */
        --color-text-primary:   #1e293b;
        --color-text-secondary: #94a3b8;
        --color-text-muted:     #94a3b8;
        --color-background:     #f0fdf4;
        --color-surface:        #ffffff;
        --color-border:         #e8edf5;
        --color-success:        #16a34a;
        --color-danger:         #f43f5e;
        --color-warning:        #fbbf24;
        /* Gradients */
        --gradient-primary:    linear-gradient(132deg, #16a34a 0%, #15803d 100%);
        --gradient-stripe:     linear-gradient(90deg,#16a34a 0%,#16a34a 33.333%,#fbbf24 33.333%,#fbbf24 66.666%,#f43f5e 66.666%,#f43f5e 100%);
        --gradient-blob-green: linear-gradient(135deg, #dcfce7, #bbf7d0 50%, #d1fae5);
        --gradient-blob-gold:  linear-gradient(135deg, #fef9c3, #fde68a 50%, #fef3c7);
        --gradient-page:       linear-gradient(170deg, #f0fdf4 0%, #ecfdf5 45%, #f0f9ff 100%);
        --font-family:         'Nunito', system-ui, sans-serif;
        --radius-sm:   8px;
        --radius-md:  14px;
        --radius-lg:  16px;
        --radius-xl:  32px;
        --radius-full:9999px;
        --shadow-card:         0 24px 64px rgba(22,163,74,0.13), 0 4px 20px rgba(0,0,0,0.06), 0 0 0 1px rgba(22,163,74,0.08);
        --shadow-button:       0 10px 28px rgba(22,163,74,0.38), 0 2px 8px rgba(0,0,0,0.07);
        --shadow-button-hover: 0 14px 32px rgba(22,163,74,0.50), 0 2px 8px rgba(0,0,0,0.07);
        --shadow-sm:           0 2px 10px rgba(0,0,0,0.05);
        --anim-blob-duration:  10s;
        --anim-blob-duration-2:13s;
        --anim-easing:         ease-in-out;
        --anim-transition-fast:150ms ease;
        --anim-transition-base:200ms ease;
      }

      @keyframes treeSway {
        0%, 100% { transform: rotate(-1.5deg); transform-origin: 60px 128px; }
        50%       { transform: rotate(1.5deg);  transform-origin: 60px 128px; }
      }
      @keyframes coinBob1 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-5px); }
      }
      @keyframes coinBob2 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-7px); }
      }
      @keyframes coinBob3 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-4px); }
      }
      @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
        45%       { opacity: 1; transform: scale(1.3) rotate(22deg); }
        65%       { opacity: 0.7; transform: scale(1) rotate(12deg); }
      }
      @keyframes leafSway {
        0%, 100% { transform: rotate(0deg) scale(1); }
        50%       { transform: rotate(6deg) scale(1.05); }
      }
      @keyframes leafDrift {
        0%   { transform: translate(0,0) rotate(0deg); opacity:0.8; }
        100% { transform: translate(-28px,-58px) rotate(-45deg); opacity:0; }
      }
      @keyframes blobMorph {
        0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        50%       { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
      }
      @keyframes fadeInUp {
        from { opacity:0; transform:translateY(14px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes floatUp {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-9px); }
      }
      @keyframes growUp {
        from { transform:scaleY(0); transform-origin:bottom center; opacity:0; }
        to   { transform:scaleY(1); transform-origin:bottom center; opacity:1; }
      }
      @keyframes coinRain {
        0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
        100% { transform:translateY(60px) rotate(180deg); opacity:0; }
      }

      * { -webkit-tap-highlight-color: transparent; }
      body {
        font-family: var(--font-family);
        background: var(--gradient-page);
        background-color: var(--color-background);
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* в”Җв”Җ Component classes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
      .pr-card {
        background: var(--color-surface);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-card);
        overflow: hidden;
        position: relative;
      }
      .pr-stripe {
        position: absolute; top:0; left:0; right:0;
        height: 5px; background: var(--gradient-stripe); z-index: 2;
      }
      .pr-blob-top {
        position:absolute; top:-90px; right:-90px;
        width:280px; height:280px;
        background: var(--gradient-blob-green);
        opacity:0.6; pointer-events:none;
        animation: blobMorph var(--anim-blob-duration) var(--anim-easing) infinite;
      }
      .pr-blob-bottom {
        position:absolute; bottom:-70px; left:-70px;
        width:220px; height:220px;
        background: var(--gradient-blob-gold);
        opacity:0.5; pointer-events:none;
        animation: blobMorph var(--anim-blob-duration-2) var(--anim-easing) infinite 3s;
      }
      .sp-tree-logo {
        animation: treeSway 4.5s var(--anim-easing) infinite;
      }
      .sp-chore-icon {
        animation: floatUp 3.2s var(--anim-easing) infinite;
      }
      .pr-btn-primary {
        width:100%; padding:18px 22px;
        background: var(--gradient-primary);
        border:none; border-radius: var(--radius-lg);
        box-shadow: var(--shadow-button);
        font-family: var(--font-family);
        font-size:16px; font-weight:800; color:#fff;
        cursor:pointer;
        transition: transform var(--anim-transition-fast), box-shadow var(--anim-transition-fast);
        display:flex; align-items:center; gap:11px;
      }
      .pr-btn-primary:hover  { transform:translateY(-1px); box-shadow:var(--shadow-button-hover); }
      .pr-btn-primary:active { transform:translateY(0);    box-shadow:var(--shadow-button); }
      .pr-section-label {
        font-family: var(--font-family);
        font-size:10px; font-weight:700;
        letter-spacing:0.14em; text-transform:uppercase;
        color: var(--color-text-muted);
      }

      /* в”Җв”Җ Legacy compat в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */

        width:16px; height:16px; border-radius:50%;

      .pin-dot.filled { background: var(--color-green-600); }
      .numpad-btn {
        height:64px; font-size:22px; font-weight:700; font-family:var(--font-family);
        border-radius:var(--radius-lg); background:var(--color-surface);
        border:1.5px solid var(--color-border); box-shadow:var(--shadow-sm);
        transition:background 0.1s; cursor:pointer;
      }
      .numpad-btn:active { background:#f1f5f9; }
      .tab-active   { color:var(--color-green-600); border-bottom:2px solid var(--color-green-600); }
      .tab-inactive { color:#6b7280; }
      .card {
        background:var(--color-surface); border-radius:var(--radius-lg);
        padding:16px; box-shadow:var(--shadow-sm);
      }
      .sidebar-item {
        display:flex;align-items:center;gap:12px;width:100%;padding:10px 14px;
        border-radius:12px;font-size:14px;font-weight:700;font-family:var(--font-family);
        transition:background 0.15s;text-align:left;
      }
      .sidebar-item.active            { background:rgba(255,255,255,0.15);color:white; }
      .sidebar-item:not(.active)      { color:rgba(255,255,255,0.6); }
      .sidebar-item:not(.active):hover{ background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85); }
      input, select {
        outline:none; border:1.5px solid var(--color-border);
        border-radius:var(--radius-md); padding:10px 14px !important;
        width:100%; font-size:15px; font-family:var(--font-family);
        transition:border-color 0.15s; color:var(--color-text-primary);

      input:focus, select:focus { border-color:var(--color-green-600); }
      .btn-primary {
        background:var(--gradient-primary); color:white;
        border-radius:var(--radius-lg); padding:12px;
        font-weight:800; font-size:16px; width:100%;
        font-family:var(--font-family); border:none;
        box-shadow:var(--shadow-button); transition:opacity 0.15s; cursor:pointer;

      .btn-primary:active { opacity:0.85; }
      .btn-outline {
        border:1.5px solid var(--color-border); color:#374151;
        border-radius:var(--radius-lg); padding:12px;
        font-weight:700; font-size:15px; width:100%;
        font-family:var(--font-family); background:transparent; cursor:pointer;
      }
      .badge {
        display:inline-flex; align-items:center; justify-content:center;
        background:#ef4444; color:white; font-size:11px; font-weight:700;
        width:18px; height:18px; border-radius:50%;
      }
    </style>
</head>

async function loadCache() {
    const uid = currentUser.id;
    const [kRes, cRes, compRes, txRes] = await Promise.all([
        sb.from('kids').select('*').eq('user_id', uid),
        sb.from('chores').select('*').eq('user_id', uid),
        sb.from('completions').select('*').eq('user_id', uid),
        sb.from('transactions').select('*').eq('user_id', uid),
    ]);
    cache = {
        kids: kRes.data || [],
        chores: (cRes.data || []).map(c => ({ ...c, assignedTo: c.assigned_to })),
        completions: (compRes.data || []).map(c => ({ ...c, choreId: c.chore_id, kidId: c.kid_id, completedAt: c.completed_at })),
        transactions: (txRes.data || []).map(t => ({ ...t, kidId: t.kid_id, createdAt: t.created_at })),
    };
}

async function initApp() {
    document.getElementById('app').innerHTML = '<div class="min-h-screen flex items-center justify-center"><p style="color:var(--color-text-secondary)">LoadingвҖҰ</p></div>';
    const { data: { session } } = await sb.auth.getSession();
    if (session) { currentUser = session.user; await loadCache(); }
    render();
    sb.auth.onAuthStateChange(async (event, session) => {
        currentUser = session?.user || null;
        if (currentUser) { await loadCache(); }
        else { cache = { kids: [], chores: [], completions: [], transactions: [] }; S.view = 'home'; }
        render();
    });
}

const DEFAULT_TREE_THRESHOLDS = { t1: 100, t2: 250, t3: 500, t4: 1000 };

function loadTreeThresholds() {
    const fromMeta = currentUser?.user_metadata?.tree_thresholds;
    if (fromMeta) return { ...DEFAULT_TREE_THRESHOLDS, ...fromMeta };
    try {
        const s = localStorage.getItem('sprout_tree_thresholds');
        return s ? { ...DEFAULT_TREE_THRESHOLDS, ...JSON.parse(s) } : { ...DEFAULT_TREE_THRESHOLDS };
    } catch { return { ...DEFAULT_TREE_THRESHOLDS }; }
}
async function saveTreeThresholds(t) {
    const { data, error } = await sb.auth.updateUser({ data: { tree_thresholds: t } });
    if (error) { toast('вқҢ Could not save thresholds.'); return false; }
    if (data?.user) currentUser = data.user;
    localStorage.setItem('sprout_tree_thresholds', JSON.stringify(t));
    return true;
}
function getTreeStage(balance) {
    const t = loadTreeThresholds();
    if (balance < t.t1) return 0;
    if (balance < t.t2) return 1;
    if (balance < t.t3) return 2;
    if (balance < t.t4) return 3;
    return 4;
}

function weekStart() {
    const d = new Date(); const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    const mon = new Date(d); mon.setDate(d.getDate() + diff); mon.setHours(0,0,0,0); return mon;
}
function weeklyEarned(db, kidId) {
    const mon = weekStart();
    return db.transactions
        .filter(t => t.kidId === kidId && t.type === 'chore' && new Date(t.createdAt) >= mon)
        .reduce((s, t) => s + t.amount, 0);
}
function weeklyPossible(db, kidId) {
    return db.chores
        .filter(c => choreAssignedTo(c, kidId))
        .reduce((s, c) => {
            const freq = (!c.schedule || c.schedule === 'daily') ? 7 : (c.days || []).length;
            return s + (c.value * freq);
        }, 0);
}
function choreScheduleLabel(c) {
    if (!c.schedule || c.schedule === 'daily') return 'Daily';
    if (!c.days || c.days.length === 0) return 'No days set';
    if (c.days.length === 7) return 'Daily';
    return c.days.join(', ');
}
function choreIsForToday(c) {
    if (!c.schedule || c.schedule === 'daily') return true;
    const today = DAYS[(new Date().getDay() + 6) % 7];
    return (c.days || []).includes(today);
}
function choreAssignedTo(c, kidId) {
    if (!c.assignedTo || c.assignedTo === 'all') return true;
    if (Array.isArray(c.assignedTo)) return c.assignedTo.includes(kidId);
    return c.assignedTo === kidId;
}
function choreAssignmentLabel(c, kids) {
    if (!c.assignedTo || c.assignedTo === 'all') return 'All kids';
    if (Array.isArray(c.assignedTo)) {
        if (c.assignedTo.length === kids.length) return 'All kids';
        return c.assignedTo.map(id => kids.find(k => k.id === id)?.name || '?').join(', ');
    }
    return kids.find(k => k.id === c.assignedTo)?.name || '?';
}

function openModal(type, data = {}) {
    const defaultEmoji = (type === 'add-kid' || type === 'edit-kid') ? 'рҹҳҖ' : '1';
    S.selectedEmoji    = data.emoji     || defaultEmoji;
    S.selectedColor    = data.color_key || 'blue';
    S.selectedSchedule = data.schedule  || 'daily';
    S.selectedDays     = data.days      ? [...data.days] : [];
    S.selectedKids     = !data.assignedTo || data.assignedTo === 'all' ? 'all'
                       : Array.isArray(data.assignedTo) ? [...data.assignedTo]
                       : [data.assignedTo];
    S.modal = { type, data }; render();
}
function pickKidColor(key) { snapModalInputs(); S.selectedColor = key; render(); }
function closeModal() { S.modal = null; render(); }

function snapModalInputs() {
    if (!S.modal) return;
    const t = S.modal.type;
    if (t === 'add-chore' || t === 'edit-chore') {
        const n = document.getElementById('c-name');
        const d = document.getElementById('c-desc');
        const v = document.getElementById('c-val');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, description: d?.value, value: v?.value };
    }
    if (t === 'add-kid' || t === 'edit-kid') {
        const n = document.getElementById('k-name');
        const p = document.getElementById('k-pin');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, pin: p?.value };
    }
}
function pickEmoji(em) { snapModalInputs(); S.selectedEmoji = em; render(); }
function setSchedule(s) { snapModalInputs(); S.selectedSchedule = s; render(); }
function setAllKids() { snapModalInputs(); S.selectedKids = 'all'; render(); }
function toggleKidAssignment(id) {
    snapModalInputs();
    if (S.selectedKids === 'all') { S.selectedKids = [id]; render(); return; }
    const arr = Array.isArray(S.selectedKids) ? [...S.selectedKids] : [];
    const i = arr.indexOf(id);
    if (i === -1) arr.push(id); else arr.splice(i, 1);
    S.selectedKids = arr.length === 0 ? 'all' : arr;
    render();
}
function toggleDay(d) {
    snapModalInputs();
    const i = S.selectedDays.indexOf(d);
    if (i === -1) S.selectedDays.push(d); else S.selectedDays.splice(i, 1);
    render();
}

// в”Җв”Җв”Җ AUTH VIEW в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function vLogin() {
    return `
    <div class="min-h-screen flex items-center justify-center p-6" style="background:var(--color-background)">
      <div style="width:100%;max-width:440px">
        <div class="pr-card" style="padding:52px 40px 44px">
          <div class="pr-stripe"></div>
          <div class="pr-blob-top"></div>
          <div class="pr-blob-bottom"></div>
          <div style="position:relative;z-index:1">
            <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:32px">
              ${treeSVG(100, true)}
              <h1 style="font-family:var(--font-family);font-size:36px;font-weight:900;color:#14532d;letter-spacing:-0.03em;margin-top:18px;margin-bottom:0">Sprout</h1>
              <p style="font-family:var(--font-family);font-size:13px;font-weight:600;color:#86efac;margin-top:9px">Kids Chore &amp; Allowance Tracker</p>
            </div>
            <input type="email" id="l-email" placeholder="Email address" class="mb-3"
              onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
            <input type="password" id="l-pass" placeholder="Password" class="mb-2"
              onkeydown="if(event.key==='Enter')doSignIn()">
            <p id="l-err" style="color:#f43f5e;font-size:14px;margin-bottom:12px;min-height:20px"></p>
            <button onclick="doSignIn()" class="btn-primary mb-3">Sign In</button>
            <button onclick="doSignUp()" class="btn-outline">Create Account</button>
            <p style="font-family:var(--font-family);font-size:12px;font-weight:600;color:var(--color-text-muted);text-align:center;margin-top:24px">
              Your family's data is stored securely in the cloud.
            </p>
          </div>
        </div>
      </div>
    </div>`;
}
async function doSignIn() {
    const email = document.getElementById('l-email')?.value?.trim();
    const pass  = document.getElementById('l-pass')?.value;
    const errEl = document.getElementById('l-err');
    if (!email || !pass) { if (errEl) errEl.textContent = 'Please enter email and password.'; return; }
    if (errEl) errEl.textContent = 'Signing inвҖҰ';
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error && errEl) errEl.textContent = error.message;
}
async function doSignUp() {
    const email = document.getElementById('l-email')?.value?.trim();
    const pass  = document.getElementById('l-pass')?.value;
    const errEl = document.getElementById('l-err');
    if (!email || !pass) { if (errEl) errEl.textContent = 'Please enter email and password.'; return; }
    if (errEl) errEl.textContent = 'Creating accountвҖҰ';
    const { error } = await sb.auth.signUp({ email, password: pass });
    if (error) { if (errEl) errEl.textContent = error.message; }
    else { toast('Account created! Check your email to confirm, then sign in.'); }
}

function pOverview(db) {
    const pending = db.completions.filter(c => !c.approved && !c.rejected);
    const kidRows = db.kids.map((k, i) => {
        const ac = kidAccent(k);
        const kBalance = k.balance || 0;
        return `
        <div class="card flex items-center gap-3">
          <div style="width:40px;height:40px;background:${ac.bg};border:1.5px solid ${ac.border};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${kidIcon(k)}</div>
          <div class="flex-1">
            <p style="font-family:var(--font-family);font-weight:700;color:var(--color-text-primary);font-size:14px">${k.name}</p>
            <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary)">Weekly potential: ${R(weeklyPossible(db, k.id))}</p>
          </div>
          <div class="text-right">
            <p style="font-family:var(--font-family);font-weight:800;color:${ac.text};font-size:15px">${R(kBalance)}</p>
            <button onclick="openModal('payout',{kidId:'${k.id}'})" style="font-family:var(--font-family);font-size:11px;color:var(--color-text-muted);text-decoration:underline;cursor:pointer;background:none;border:none;margin-top:2px">pay out</button>
          </div>
        </div>`;
    }).join('');

    const pendingRows = pending.map(c => {
        const chore = db.chores.find(x => x.id === c.choreId);
        const kid   = db.kids.find(x => x.id === c.kidId);
        return `
        <div class="card flex items-center gap-3">
          <div class="flex-1">
            <p style="font-family:var(--font-family);font-weight:700;color:var(--color-text-primary);font-size:14px">${chore?.name || 'Deleted chore'}</p>
            <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary)">${kid?.name || '?'} В· ${R(chore?.value)} В· ${dateStr(c.completedAt)}</p>
          </div>
          <button onclick="approveChore('${c.id}')" style="background:var(--color-green-100);color:var(--color-green-700);padding:6px 12px;border-radius:12px;font-family:var(--font-family);font-size:12px;font-weight:700;border:none;cursor:pointer">вң“ Approve</button>
          <button onclick="rejectChore('${c.id}')"  style="background:var(--color-coral-bg);color:var(--color-coral-text);padding:6px 12px;border-radius:12px;font-family:var(--font-family);font-size:12px;font-weight:700;border:none;cursor:pointer">вң—</button>
        </div>`;
    }).join('');

    const totalWeekly = db.kids.reduce((s, k) => s + weeklyPossible(db, k.id), 0);
    const totalEarned = db.kids.reduce((s, k) => s + weeklyEarned(db, k.id), 0);
    const weeklyCard  = db.kids.length === 0 ? '' : `
    <div class="card mb-5" style="background:linear-gradient(135deg,#16a34a,#14532d);color:white;max-width:60%;margin-left:auto;margin-right:auto">
      <p class="pr-section-label" style="color:#86efac;margin-bottom:12px">Weekly Payout Summary</p>
      <div class="flex justify-between items-end mb-3">
        <div>
          <p style="color:#86efac;font-size:11px;font-family:var(--font-family)">Earned so far this week</p>
          <p style="font-family:var(--font-family);font-size:24px;font-weight:800">${R(totalEarned)}</p>
        </div>
        <div class="text-right">
          <p style="color:#86efac;font-size:11px;font-family:var(--font-family)">Total possible this week</p>
          <p style="font-family:var(--font-family);font-size:24px;font-weight:800">${R(totalWeekly)}</p>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.2);border-radius:99px;height:8px;overflow:hidden">
        <div style="background:white;width:${totalWeekly>0?Math.min(100,Math.round(totalEarned/totalWeekly*100)):0}%;height:100%;border-radius:99px"></div>
      </div>
      <div class="flex justify-center gap-8 mt-3" style="border-top:1px solid rgba(255,255,255,0.15);padding-top:10px">
        ${db.kids.map(k => `
          <div class="text-center">
            <p style="font-size:16px">${kidIcon(k)}</p>
            <p style="font-size:10px;color:#86efac;margin-top:2px;font-family:var(--font-family)">${R(weeklyPossible(db,k.id))}</p>
          </div>`).join('')}
      </div>
    </div>`;

    return `
    ${weeklyCard}
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-2">
      <div>
        <p class="pr-section-label mb-3">Balances</p>
        <div class="flex flex-col gap-2">
          ${db.kids.length === 0
            ? `<div class="card text-center py-6" style="color:var(--color-text-muted);font-family:var(--font-family);font-size:14px">No kids added yet.</div>`
            : kidRows}
        </div>
      </div>
      <div>
        <p class="pr-section-label mb-3">Pending Approvals ${pending.length ? `<span class="badge ml-1">${pending.length}</span>` : ''}</p>
        <div class="flex flex-col gap-2">
          ${pending.length === 0
            ? `<div class="card text-center py-6" style="color:var(--color-text-muted);font-family:var(--font-family);font-size:14px">Nothing waiting for approval рҹҺү</div>`
            : pendingRows}
        </div>
      </div>
    </div>`;
}

function pChores(db) {
    return `

        : `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
          ${db.kids.map((k, i) => {

function pSettings() {
    const currCode = currentUser?.user_metadata?.currency || 'ZAR';
    const t = loadTreeThresholds();
    const tiers = [
        { stage: 0, name: 'Seedling',   range: `${R(0)} вҖ“ ${R(t.t1 - 0.01)}` },
        { stage: 1, name: 'Sapling',    range: `${R(t.t1)} вҖ“ ${R(t.t2 - 0.01)}` },
        { stage: 2, name: 'Young Tree', range: `${R(t.t2)} вҖ“ ${R(t.t3 - 0.01)}` },
        { stage: 3, name: 'Money Tree', range: `${R(t.t3)} вҖ“ ${R(t.t4 - 0.01)}` },
        { stage: 4, name: 'Forest',     range: `${R(t.t4)} and above` },
    ];
    return `
    <div style="max-width:600px">
      <p class="pr-section-label mb-5">Settings</p>

      <!-- Currency -->
      <div class="card mb-5">
        <p style="font-family:var(--font-family);font-weight:800;color:var(--color-text-primary);font-size:15px;margin-bottom:4px">Currency / Value Display</p>
        <p style="font-family:var(--font-family);font-size:13px;color:var(--color-text-secondary);margin-bottom:16px">Choose how values are displayed. Select "Points" for a non-monetary reward system.</p>
        <select onchange="saveCurrency(this.value)">
          ${CURRENCIES.map(c => `<option value="${c.code}" ${c.code === currCode ? 'selected' : ''}>${c.name}</option>`).join('')}
        </select>
        <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary);margin-top:12px">Preview: <span style="font-weight:800;color:var(--color-text-primary)">${R(25)}</span></p>
      </div>

      <!-- Tree Growth Stages -->
      <div class="card">
        <p style="font-family:var(--font-family);font-weight:800;color:var(--color-text-primary);font-size:15px;margin-bottom:4px">Tree Growth Stages</p>
        <p style="font-family:var(--font-family);font-size:13px;color:var(--color-text-secondary);margin-bottom:20px">Set the balance thresholds that unlock each tree stage for your kids. The tree on each kid's screen will grow as they save more.</p>

        <!-- Stage cards -->
        <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:24px">
          ${tiers.map(tier => `
          <div style="display:flex;align-items:center;gap:16px;padding:14px 16px;border-radius:16px;background:${tier.stage === 4 ? 'linear-gradient(135deg,#f0fdf4,#dcfce7)' : 'var(--color-background)'};border:1.5px solid ${tier.stage === 4 ? 'var(--color-green-border)' : 'var(--color-border)'}">
            <div style="flex-shrink:0">${treeStageSVG(tier.stage, 52)}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
                <p style="font-family:var(--font-family);font-weight:800;color:var(--color-text-primary);font-size:14px">${tier.name}</p>
                ${tier.stage === 4 ? `<span style="font-family:var(--font-family);font-size:10px;font-weight:700;background:var(--color-green-100);color:var(--color-green-700);padding:2px 8px;border-radius:99px">TOP TIER рҹҸҶ</span>` : ''}
              </div>
              <p style="font-family:var(--font-family);font-size:12px;color:var(--color-text-secondary)">${TREE_STAGES[tier.stage].description}</p>
              <p style="font-family:var(--font-family);font-size:12px;font-weight:700;color:var(--color-green-600);margin-top:3px">${tier.range}</p>
            </div>
          </div>`).join('')}
        </div>

        <!-- Threshold editors -->
        <p style="font-family:var(--font-family);font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:12px">Set Thresholds</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
          ${[
            { key:'t1', label:'Seedling вҶ’ Sapling', val: t.t1 },
            { key:'t2', label:'Sapling вҶ’ Young Tree', val: t.t2 },
            { key:'t3', label:'Young Tree вҶ’ Money Tree', val: t.t3 },
            { key:'t4', label:'Money Tree вҶ’ Forest', val: t.t4 },
          ].map(row => `
          <div>
            <p style="font-family:var(--font-family);font-size:11px;font-weight:700;color:var(--color-text-secondary);margin-bottom:6px">${row.label}</p>
            <div style="position:relative">
              <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--color-text-secondary);font-size:14px;line-height:1;pointer-events:none">${currSymbol()}</span>
              <input id="thresh-${row.key}" type="number" value="${row.val}" min="1" step="1"
                style="padding-left:32px !important;font-weight:700">

        <button onclick="saveTreeThresholdsFromUI()" class="btn-primary" style="width:auto;padding:10px 28px">Save Thresholds</button>
        <button onclick="resetTreeThresholds()" style="font-family:var(--font-family);font-size:12px;font-weight:600;color:var(--color-text-muted);background:none;border:none;cursor:pointer;margin-left:16px">Reset to defaults</button>
      </div>
    </div>`;
}

function vKidPin() {

    ).join('');
    return `
    <div class="min-h-screen flex flex-col items-center justify-center p-6" style="background:var(--color-background)">
      <button onclick="go('home')" style="color:var(--color-text-muted);font-family:var(--font-family);font-size:14px;background:none;border:none;cursor:pointer;margin-bottom:40px;position:absolute;top:24px;left:24px">вҶҗ Terug</button>
      <div class="flex flex-col items-center">
        <div style="width:80px;height:80px;background:${ac.bg};border:2px solid ${ac.border};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:12px">${kidIcon(kid)}</div>
        <h2 style="font-family:var(--font-family);font-size:28px;font-weight:800;color:var(--color-text-primary);margin-bottom:4px">${kid?.name || ''}</h2>

}
function pinPress(k) {
    if (k === 'вҢ«') { S.pin = S.pin.slice(0,-1); render(); return; }
    if (S.pin.length >= 4) return;
    S.pin += k; render();
    if (S.pin.length === 4) setTimeout(checkPin, 120);
}
function checkPin() {
    const db = DB.load();
    const kid = db.kids.find(k => k.id === S.pinKidId);
    if (kid && S.pin === kid.pin) {
        S.kidId = S.pinKidId; S.pin = ''; go('kid');
    } else {
        const el = document.getElementById('pin-err');
        if (el) el.textContent = 'Wrong PIN. Try again.';
        setTimeout(() => { S.pin = ''; render(); }, 900);
    }
}

function goParent() {
    const pin = currentUser?.user_metadata?.parent_pin;
    if (pin) { S.parentPin = ''; go('parent-pin'); } else { go('parent', { tab: 'overview' }); }
}

function parentPinPress(k) {
    if (k === 'вҢ«') { S.parentPin = S.parentPin.slice(0,-1); render(); return; }
    if (S.parentPin.length >= 4) return;
    S.parentPin += k; render();
    if (S.parentPin.length === 4) setTimeout(checkParentPin, 120);
}
function checkParentPin() {
    const correctPin = currentUser?.user_metadata?.parent_pin;
    if (S.parentPin === correctPin) {
        S.parentPin = ''; go('parent', { tab: 'overview' });
    } else {
        const el = document.getElementById('ppin-err');
        if (el) el.textContent = 'Wrong PIN. Try again.';
        setTimeout(() => { S.parentPin = ''; render(); }, 900);
    }
}

function vKid() {
    const db = DB.load();
    const kid = db.kids.find(k => k.id === S.kidId);
    if (!kid) { go('home'); return ''; }
    const ac       = kidAccent(kid);
    const today    = new Date().toDateString();
    const allChores = db.chores.filter(c => choreAssignedTo(c, kid.id) && choreIsForToday(c));
    const doneToday = db.completions.filter(c => c.kidId === kid.id && !c.rejected && new Date(c.completedAt).toDateString() === today);
    const doneTodayIds = doneToday.map(c => c.choreId);
    const pending   = doneToday.filter(c => !c.approved);
    const ready     = allChores.filter(c => !doneTodayIds.includes(c.id));
    const txns      = db.transactions.filter(t => t.kidId === kid.id)
                        .sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt))
                        .slice(0, 12);
    const typeIcon  = { payout:'рҹ’ё', weekly:'рҹ“…', chore:'вң…', manual:'рҹ’°' };
    const treeStageIdx = getTreeStage(kid.balance);
    const treeThresh   = loadTreeThresholds();
    const threshArr    = [treeThresh.t1, treeThresh.t2, treeThresh.t3, treeThresh.t4];
    const nextThresh   = treeStageIdx < 4 ? threshArr[treeStageIdx] : null;
    const prevThresh   = treeStageIdx > 0 ? (treeStageIdx === 1 ? treeThresh.t1 : treeStageIdx === 2 ? treeThresh.t2 : treeStageIdx === 3 ? treeThresh.t3 : treeThresh.t4) : 0;
    const stageFloor   = treeStageIdx === 0 ? 0 : threshArr[treeStageIdx - 1];
    const stagePct     = nextThresh
        ? Math.min(100, Math.round(((kid.balance - stageFloor) / (nextThresh - stageFloor)) * 100))
        : 100;
    return `
    <div class="flex flex-col min-h-screen">
      <div style="background:${ac.header};color:white;padding:32px 32px 28px;position:relative;overflow:hidden">
        <div class="max-w-5xl mx-auto">
          <!-- Top row: avatar/name + home button -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
            <div style="display:flex;align-items:center;gap:14px">
              <div style="width:52px;height:52px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px">${kidIcon(kid)}</div>
              <div>
                <p style="font-family:var(--font-family);font-size:12px;color:rgba(255,255,255,0.7)">Hi there,</p>
                <h1 style="font-family:var(--font-family);font-size:20px;font-weight:800">${kid.name}</h1>
              </div>
            </div>
            <button onclick="go('home')" style="font-family:var(--font-family);color:rgba(255,255,255,0.7);font-size:14px;background:none;border:none;cursor:pointer">вҶҗ Home</button>
          </div>
          <!-- Balance + Tree row (3-column: left content | centre tree | right spacer) -->
          <div style="display:flex;align-items:flex-end;gap:16px">
            <!-- Left: balance + progress -->
            <div style="flex:1">
              <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px">
                <p style="font-family:var(--font-family);font-size:44px;font-weight:900;line-height:1">${R(kid.balance)}</p>
                <p style="font-family:var(--font-family);color:rgba(255,255,255,0.7)">balance</p>
              </div>
              ${nextThresh ? `
              <div>
                <p style="font-family:var(--font-family);font-size:17px;color:rgba(255,255,255,0.85);margin-bottom:8px;font-weight:600">
                  ${R(Math.max(0, nextThresh - kid.balance))} to unlock <strong>${TREE_STAGES[treeStageIdx + 1]?.label || ''}</strong>
                </p>
                <div style="width:210px;background:rgba(255,255,255,0.25);border-radius:99px;height:8px;overflow:hidden">
                  <div style="background:rgba(255,255,255,0.9);width:${stagePct}%;height:100%;border-radius:99px;transition:width 0.4s ease"></div>
                </div>
              </div>` : `
              <p style="font-family:var(--font-family);font-size:17px;color:rgba(255,255,255,0.85);font-weight:700">рҹҸҶ Forest achieved вҖ” top tier!</p>`}
            </div>
            <!-- Centre: tree -->
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">
              ${treeStageSVG(treeStageIdx, 120)}
              <p style="font-family:var(--font-family);font-size:13px;font-weight:800;color:rgba(255,255,255,0.9);letter-spacing:0.06em;text-transform:uppercase">${TREE_STAGES[treeStageIdx].label}</p>
            </div>
            <!-- Right spacer (mirrors left to keep tree centred) -->
            <div style="flex:1"></div>
          </div>
        </div>
      </div>
      <div style="flex:1;overflow:auto;padding:24px 32px;background:var(--color-background)">

// в”Җв”Җв”Җ ACTIONS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function addKid() {
    const name      = document.getElementById('k-name').value.trim();
    const pin       = document.getElementById('k-pin').value.trim();
    const emoji     = S.selectedEmoji || 'рҹҳҖ';
    const color_key = S.selectedColor || 'blue';
    if (!name)                 return toast('вҡ пёҸ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('вҡ пёҸ PIN must be exactly 4 digits (e.g. 1234).');
    const id = uid();
    const { error } = await sb.from('kids').insert({ id, user_id: currentUser.id, name, pin, emoji, color_key, balance: 0 });
    if (error) return toast('вқҢ Could not save. Check your connection.');
    cache.kids.push({ id, name, pin, emoji, color_key, balance: 0 });
    closeModal(); toast(`${name} added! рҹҺү`);
}
function editKid(id) {
    const k = cache.kids.find(x => x.id === id);
    if (k) openModal('edit-kid', { ...k });
}
async function saveKid(id) {
    const name      = document.getElementById('k-name').value.trim();
    const pin       = document.getElementById('k-pin').value.trim();
    const emoji     = S.selectedEmoji || 'рҹҳҖ';
    const color_key = S.selectedColor || 'blue';
    if (!name)                 return toast('вҡ пёҸ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('вҡ пёҸ PIN must be exactly 4 digits (e.g. 1234).');
    const { error } = await sb.from('kids').update({ name, pin, emoji, color_key }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('вқҢ Could not save.');
    const k = cache.kids.find(x => x.id === id);
    if (k) { k.name = name; k.pin = pin; k.emoji = emoji; k.color_key = color_key; }
    closeModal(); toast('Saved!');
}
function deleteKid(id) {
    const k = cache.kids.find(x => x.id === id);
    openModal('confirm-delete', { msg: `Remove ${k?.name}? All their data will be deleted.`, onConfirm: `doDeleteKid('${id}')` });
}
async function doDeleteKid(id) {
    const { error } = await sb.from('kids').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('вқҢ Could not delete.');
    cache.kids         = cache.kids.filter(x => x.id !== id);
    cache.completions  = cache.completions.filter(x => x.kidId !== id);
    cache.transactions = cache.transactions.filter(x => x.kidId !== id);
    closeModal(); render();
}

async function addChore() {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || 'вӯҗ';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('вҡ пёҸ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('вҡ пёҸ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('вҡ пёҸ Please select at least one kid.');
    const id = uid();
    const { error } = await sb.from('chores').insert({ id, user_id: currentUser.id, name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days });
    if (error) return toast('вқҢ Could not save. Check your connection.');
    cache.chores.push({ id, name, description: desc, value: val, assignedTo, emoji, schedule, days });
    closeModal(); toast('Chore added!');
}
function editChore(id) {
    const c = cache.chores.find(x => x.id === id);
    if (c) openModal('edit-chore', { ...c });
}
async function saveChore(id) {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || 'вӯҗ';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('вҡ пёҸ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('вҡ пёҸ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('вҡ пёҸ Please select at least one kid.');
    const { error } = await sb.from('chores').update({ name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('вқҢ Could not save.');
    const c = cache.chores.find(x => x.id === id);
    if (c) { c.name = name; c.description = desc; c.value = val; c.assignedTo = assignedTo; c.emoji = emoji; c.schedule = schedule; c.days = days; }
    closeModal(); toast('Saved!');
}
function deleteChore(id) {
    openModal('confirm-delete', { msg: 'Delete this chore?', onConfirm: `doDeleteChore('${id}')` });
}
async function doDeleteChore(id) {
    const { error } = await sb.from('chores').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('вқҢ Could not delete.');
    cache.chores = cache.chores.filter(x => x.id !== id);
    closeModal(); render();
}

async function approveChore(cid) {
    const comp  = cache.completions.find(x => x.id === cid);
    if (!comp) return;
    const chore = cache.chores.find(x => x.id === comp.choreId);
    const kid   = cache.kids.find(x => x.id === comp.kidId);
    await sb.from('completions').update({ approved: true }).eq('id', cid).eq('user_id', currentUser.id);
    comp.approved = true;
    if (chore && kid) {
        const newBalance = (kid.balance || 0) + chore.value;
        const txId = uid();
        const txCreatedAt = new Date().toISOString();
        await sb.from('kids').update({ balance: newBalance }).eq('id', kid.id).eq('user_id', currentUser.id);
        await sb.from('transactions').insert({ id: txId, user_id: currentUser.id, kid_id: kid.id, amount: chore.value, type: 'chore', description: chore.name, created_at: txCreatedAt });
        kid.balance = newBalance;
        cache.transactions.push({ id: txId, kidId: kid.id, amount: chore.value, type: 'chore', description: chore.name, createdAt: txCreatedAt });
    }
    toast(`вң“ Approved! ${R(chore?.value)} added to ${kid?.name}.`);
}
async function rejectChore(cid) {
    await sb.from('completions').update({ rejected: true }).eq('id', cid).eq('user_id', currentUser.id);
    const c = cache.completions.find(x => x.id === cid);
    if (c) c.rejected = true;
    render();
}
async function markDone(choreId) {
    const id = uid();
    const completedAt = new Date().toISOString();
    const { error } = await sb.from('completions').insert({ id, user_id: currentUser.id, chore_id: choreId, kid_id: S.kidId, completed_at: completedAt, approved: false, rejected: false });
    if (error) return toast('вқҢ Could not save. Check your connection.');
    cache.completions.push({ id, choreId, kidId: S.kidId, completedAt, approved: false, rejected: false });
    toast('Marked as done! Waiting for parent to approve. вҸі');
}
async function recordPayout() {
    const kidId  = document.getElementById('po-kid').value;
    const amount = parseFloat(document.getElementById('po-amount').value) || 0;
    if (!kidId)    return toast('вҡ пёҸ Please select a kid.');
    if (amount<=0) return toast('вҡ пёҸ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    document.getElementById('po-kid').value = '';
    document.getElementById('po-amount').value = '';
    toast(`${R(amount)} payout recorded for ${k.name}.`);
}
async function doModalPayout(kidId) {
    const amount = parseFloat(document.getElementById('m-po-amt').value) || 0;
    if (amount<=0) return toast('вҡ пёҸ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    closeModal(); toast(`${R(amount)} payout recorded for ${k.name}.`);
}

async function saveTreeThresholdsFromUI() {
    const vals = ['t1','t2','t3','t4'].map(k => parseFloat(document.getElementById('thresh-'+k)?.value));
    if (vals.some(v => isNaN(v) || v <= 0)) return toast('вҡ пёҸ All thresholds must be positive numbers.');
    if (vals[0] >= vals[1] || vals[1] >= vals[2] || vals[2] >= vals[3])
        return toast('вҡ пёҸ Each threshold must be higher than the previous one.');
    const ok = await saveTreeThresholds({ t1: vals[0], t2: vals[1], t3: vals[2], t4: vals[3] });
    if (ok) { render(); toast('рҹҢұ Tree thresholds saved!'); }
}
async function resetTreeThresholds() {
    const ok = await saveTreeThresholds({ ...DEFAULT_TREE_THRESHOLDS });
    if (ok) { render(); toast('Reset to defaults.'); }
}

async function saveCurrency(code) {
    const { data, error } = await sb.auth.updateUser({ data: { currency: code } });
    if (error) return toast('вқҢ Could not save setting.');
    if (data?.user) currentUser = data.user;
    render();
    toast('Currency updated!');
}

async function saveParentPin() {
    const pin = document.getElementById('pp-pin').value.trim();
    if (!/^\d{4}$/.test(pin)) return toast('вҡ пёҸ PIN must be exactly 4 digits.');
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: pin } });
    if (error) return toast('вқҢ Could not save PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN saved! рҹ”җ');
}
async function removeParentPin() {
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: null } });
    if (error) return toast('вқҢ Could not remove PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN removed.');
}

// в”Җв”Җв”Җ RENDER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function render() {
    const toastHtml = S.toast
        ? `<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;font-family:var(--font-family);font-size:14px;font-weight:600;padding:10px 20px;border-radius:var(--radius-full);box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:99;max-width:320px;text-align:center">${S.toast}</div>`
        : '';
    if (!currentUser) {
        document.getElementById('app').innerHTML = vLogin() + toastHtml;
        return;
    }
    const views = { home: vHome, parent: vParent, 'kid-pin': vKidPin, kid: vKid, 'parent-pin': vParentPin };
    const html  = (views[S.view] || vHome)();
    document.getElementById('app').innerHTML = html + renderModal() + toastHtml;
}

initApp();
