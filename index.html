        sb.from('chores').select('*').eq('user_id', uid),

    const curr = CURRENCIES.find(c => c.code === code) || { symbol: 'R' };
    const decimals = NO_DECIMAL_CURRENCIES.includes(code) ? 0 : 2;
    return curr.symbol + ' ' + (+(n || 0)).toFixed(decimals);

function weekStart() {
    const d = new Date(); const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    const mon = new Date(d); mon.setDate(d.getDate() + diff); mon.setHours(0,0,0,0); return mon;
}
function weeklyEarned(db, kidId) {
    const mon = weekStart();
    return db.transactions
        .filter(t => t.kidId === kidId && t.type === 'chore' && new Date(t.createdAt) >= mon)
        .reduce((s, t) => s + t.amount, 0);
}
function weeklyPossible(db, kidId) {
    return db.chores
        .filter(c => choreAssignedTo(c, kidId))
        .reduce((s, c) => {
            const freq = (!c.schedule || c.schedule === 'daily') ? 7 : (c.days || []).length;
            return s + (c.value * freq);
        }, 0);
}
function choreScheduleLabel(c) {
    if (!c.schedule || c.schedule === 'daily') return 'Daily';
    if (!c.days || c.days.length === 0) return 'No days set';
    if (c.days.length === 7) return 'Daily';
    return c.days.join(', ');
}
function choreIsForToday(c) {
    if (!c.schedule || c.schedule === 'daily') return true;
    const today = DAYS[(new Date().getDay() + 6) % 7];
    return (c.days || []).includes(today);
}
function choreAssignedTo(c, kidId) {
    if (!c.assignedTo || c.assignedTo === 'all') return true;
    if (Array.isArray(c.assignedTo)) return c.assignedTo.includes(kidId);
    return c.assignedTo === kidId;
}
function choreAssignmentLabel(c, kids) {
    if (!c.assignedTo || c.assignedTo === 'all') return 'All kids';
    if (Array.isArray(c.assignedTo)) {
        if (c.assignedTo.length === kids.length) return 'All kids';
        return c.assignedTo.map(id => kids.find(k => k.id === id)?.name || '?').join(', ');
    }
    return kids.find(k => k.id === c.assignedTo)?.name || '?';
}

function openModal(type, data = {}) {
    const defaultEmoji = (type === 'add-kid' || type === 'edit-kid') ? '😀' : '⭐';
    S.selectedEmoji    = data.emoji    || defaultEmoji;
    S.selectedSchedule = data.schedule || 'daily';
    S.selectedDays     = data.days     ? [...data.days] : [];
    S.selectedKids     = !data.assignedTo || data.assignedTo === 'all' ? 'all'
                       : Array.isArray(data.assignedTo) ? [...data.assignedTo]
                       : [data.assignedTo];
    S.modal = { type, data }; render();
}
function closeModal() { S.modal = null; render(); }

function snapModalInputs() {
    if (!S.modal) return;
    const t = S.modal.type;
    if (t === 'add-chore' || t === 'edit-chore') {
        const n = document.getElementById('c-name');
        const d = document.getElementById('c-desc');
        const v = document.getElementById('c-val');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, description: d?.value, value: v?.value };
    }
    if (t === 'add-kid' || t === 'edit-kid') {
        const n = document.getElementById('k-name');
        const p = document.getElementById('k-pin');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, pin: p?.value };
    }
}

function setSchedule(s) { snapModalInputs(); S.selectedSchedule = s; render(); }
function setAllKids() { snapModalInputs(); S.selectedKids = 'all'; render(); }
function toggleKidAssignment(id) {
    snapModalInputs();
    if (S.selectedKids === 'all') { S.selectedKids = [id]; render(); return; }
    const arr = Array.isArray(S.selectedKids) ? [...S.selectedKids] : [];
    const i = arr.indexOf(id);
    if (i === -1) arr.push(id); else arr.splice(i, 1);
    S.selectedKids = arr.length === 0 ? 'all' : arr;
    render();
}
function toggleDay(d) {
    snapModalInputs();
    const i = S.selectedDays.indexOf(d);
    if (i === -1) S.selectedDays.push(d); else S.selectedDays.splice(i, 1);
    render();
}

        <input type="password" id="l-pass" placeholder="Password" class="mb-2"
          onkeydown="if(event.key==='Enter')doSignIn()">
        <p id="l-err" class="text-red-500 text-sm mb-3 h-5"></p>
        <button onclick="doSignIn()" class="btn-primary mb-3">Sign In</button>
        <button onclick="doSignUp()" class="btn-outline">Create Account</button>
        <p class="text-xs text-gray-400 text-center mt-6">Your family's data is stored securely in the cloud.</p>
      </div>
    </div>`;
}
async function doSignIn() {
    const email = document.getElementById('l-email')?.value?.trim();
    const pass  = document.getElementById('l-pass')?.value;
    const errEl = document.getElementById('l-err');
    if (!email || !pass) { if (errEl) errEl.textContent = 'Please enter email and password.'; return; }
    if (errEl) errEl.textContent = 'Signing in…';
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error && errEl) errEl.textContent = error.message;
}
async function doSignUp() {
    const email = document.getElementById('l-email')?.value?.trim();
    const pass  = document.getElementById('l-pass')?.value;
    const errEl = document.getElementById('l-err');
    if (!email || !pass) { if (errEl) errEl.textContent = 'Please enter email and password.'; return; }
    if (errEl) errEl.textContent = 'Creating account…';
    const { error } = await sb.auth.signUp({ email, password: pass });
    if (error) { if (errEl) errEl.textContent = error.message; }
    else { toast('Account created! Check your email to confirm, then sign in.'); }
}

function pOverview(db) {
    const pending = db.completions.filter(c => !c.approved && !c.rejected);
    const kidRows = db.kids.map(k => {
        const kBalance = k.balance || 0;
        return `
        <div class="card flex items-center gap-3">
          <div class="w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center text-xl">${kidIcon(k)}</div>

            <p class="font-semibold text-gray-900 text-sm">${k.name}</p>
            <p class="text-xs text-gray-400">Weekly potential: ${R(weeklyPossible(db, k.id))}</p>
          </div>
          <div class="text-right">
            <p class="font-bold text-emerald-600">${R(kBalance)}</p>
            <button onclick="openModal('payout',{kidId:'${k.id}'})" class="text-xs text-gray-300 underline mt-0.5">pay out</button>
          </div>
        </div>`;
    }).join('');

    const pendingRows = pending.map(c => {
        const chore = db.chores.find(x => x.id === c.choreId);
        const kid   = db.kids.find(x => x.id === c.kidId);
        return `
        <div class="card flex items-center gap-3">
          <div class="flex-1">
            <p class="font-semibold text-gray-900 text-sm">${chore?.name || 'Deleted chore'}</p>

        </div>`;
    }).join('');

    const totalWeekly = db.kids.reduce((s, k) => s + weeklyPossible(db, k.id), 0);
    const totalEarned = db.kids.reduce((s, k) => s + weeklyEarned(db, k.id), 0);
    const weeklyCard  = db.kids.length === 0 ? '' : `
    <div class="card mb-5" style="background:linear-gradient(135deg,#1d4ed8,#1e40af);color:white;max-width:60%;margin-left:auto;margin-right:auto">

      <div class="flex justify-between items-end mb-3">
        <div>
          <p style="color:#bfdbfe;font-size:11px">Earned so far this week</p>
          <p class="text-2xl font-bold">${R(totalEarned)}</p>
        </div>
        <div class="text-right">
          <p style="color:#bfdbfe;font-size:11px">Total possible this week</p>
          <p class="text-2xl font-bold">${R(totalWeekly)}</p>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.2);border-radius:99px;height:8px;overflow:hidden">
        <div style="background:white;width:${totalWeekly>0?Math.min(100,Math.round(totalEarned/totalWeekly*100)):0}%;height:100%;border-radius:99px"></div>
      </div>
      <div class="flex justify-center gap-8 mt-3" style="border-top:1px solid rgba(255,255,255,0.15);padding-top:10px">
        ${db.kids.map(k => `
          <div class="text-center">
            <p style="font-size:16px">${kidIcon(k)}</p>
            <p style="font-size:10px;color:#bfdbfe;margin-top:2px">${R(weeklyPossible(db,k.id))}</p>
          </div>`).join('')}
      </div>
    </div>`;

    return `
    ${weeklyCard}
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-2">
      <div>
        <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Balances</p>
        <div class="flex flex-col gap-2">
          ${db.kids.length === 0
            ? `<div class="card text-center text-gray-300 text-sm py-6">No kids added yet.</div>`
            : kidRows}
        </div>
      </div>
      <div>
        <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Pending Approvals ${pending.length ? `<span class="badge ml-1">${pending.length}</span>` : ''}</p>
        <div class="flex flex-col gap-2">
          ${pending.length === 0
            ? `<div class="card text-center text-gray-300 text-sm py-6">Nothing waiting for approval 🎉</div>`

}

function vKidPin() {
    const db = DB.load();
    const kid = db.kids.find(k => k.id === S.pinKidId);
    const dots = [0,1,2,3].map(i =>
        `<div class="pin-dot ${S.pin.length > i ? 'filled' : ''}"></div>`).join('');
    const keys = [1,2,3,4,5,6,7,8,9,null,0,'⌫'];
    const pad = keys.map(k => k === null
        ? `<div></div>`
        : `<button class="numpad-btn" onclick="pinPress('${k}')">${k}</button>`
    ).join('');
    return `
    <div class="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-6">
      <button onclick="go('home')" class="text-gray-400 mb-10 text-sm self-start absolute top-6 left-6">← Terug</button>
      <div class="flex flex-col items-center">
        <div style="font-size:64px;margin-bottom:12px">${kidIcon(kid)}</div>
        <h2 class="text-3xl font-bold text-gray-900 mb-1">${kid?.name || ''}</h2>
        <p class="text-gray-400 mb-10">Enter your PIN</p>
        <div class="flex gap-6 mb-3">${dots}</div>
        <p id="pin-err" class="text-red-400 text-sm mb-8 h-5"></p>
        <div class="grid grid-cols-3 gap-3 w-72">${pad}</div>
      </div>
    </div>`;
}
function pinPress(k) {
    if (k === '⌫') { S.pin = S.pin.slice(0,-1); render(); return; }
    if (S.pin.length >= 4) return;
    S.pin += k; render();
    if (S.pin.length === 4) setTimeout(checkPin, 120);
}
function checkPin() {
    const db = DB.load();
    const kid = db.kids.find(k => k.id === S.pinKidId);
    if (kid && S.pin === kid.pin) {
        S.kidId = S.pinKidId; S.pin = ''; go('kid');
    } else {
        const el = document.getElementById('pin-err');
        if (el) el.textContent = 'Wrong PIN. Try again.';
        setTimeout(() => { S.pin = ''; render(); }, 900);
    }
}

function goParent() {
    const pin = currentUser?.user_metadata?.parent_pin;
    if (pin) { S.parentPin = ''; go('parent-pin'); } else { go('parent', { tab: 'overview' }); }
}

function vParentPin() {
    const dots = [0,1,2,3].map(i =>
        `<div class="pin-dot ${S.parentPin.length > i ? 'filled' : ''}"></div>`).join('');
    const keys = [1,2,3,4,5,6,7,8,9,null,0,'⌫'];
    const pad = keys.map(k => k === null
        ? `<div></div>`
        : `<button class="numpad-btn" onclick="parentPinPress('${k}')">${k}</button>`
    ).join('');
    return `
    <div class="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-6">

      </div>
    </div>`;
}
function parentPinPress(k) {
    if (k === '⌫') { S.parentPin = S.parentPin.slice(0,-1); render(); return; }
    if (S.parentPin.length >= 4) return;
    S.parentPin += k; render();
    if (S.parentPin.length === 4) setTimeout(checkParentPin, 120);
}
function checkParentPin() {
    const correctPin = currentUser?.user_metadata?.parent_pin;
    if (S.parentPin === correctPin) {
        S.parentPin = ''; go('parent', { tab: 'overview' });
    } else {
        const el = document.getElementById('ppin-err');
        if (el) el.textContent = 'Wrong PIN. Try again.';
        setTimeout(() => { S.parentPin = ''; render(); }, 900);
    }
}

function vKid() {
    const db = DB.load();
    const kid = db.kids.find(k => k.id === S.kidId);
    if (!kid) { go('home'); return ''; }
    const today     = new Date().toDateString();
    const allChores = db.chores.filter(c => choreAssignedTo(c, kid.id) && choreIsForToday(c));
    const doneToday = db.completions.filter(c => c.kidId === kid.id && !c.rejected && new Date(c.completedAt).toDateString() === today);
    const doneTodayIds = doneToday.map(c => c.choreId);
    const pending   = doneToday.filter(c => !c.approved);
    const ready     = allChores.filter(c => !doneTodayIds.includes(c.id));
    const txns      = db.transactions.filter(t => t.kidId === kid.id)
                        .sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt))
                        .slice(0, 12);
    const typeIcon  = { payout:'💸', weekly:'📅', chore:'✅', manual:'💰' };

        </p>
        ${ready.length === 0

              ${ready.map(c => `

              </div>`}
        ${pending.length > 0 ? `

          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3 mb-6">

              <div class="card flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center ${t.amount>0 ? 'bg-emerald-50' : 'bg-red-50'}" style="font-size:18px;flex-shrink:0">
                  ${typeIcon[t.type] || '💰'}
                </div>
                <div class="flex-1 min-w-0">
                  <p class="font-medium text-gray-900 truncate">${t.description}</p>
                  <p class="text-xs text-gray-400">${dateStr(t.createdAt)}</p>
                </div>
                <p class="font-bold ${t.amount>0 ? 'text-emerald-600' : 'text-red-400'} flex-shrink-0">
                  ${t.amount>0?'+':''}${R(t.amount)}
                </p>
              </div>`).join('')}
        </div>
        </div>
      </div>
    </div>`;
}

// ─── MODALS ──────────────────────────────────────────────────────
function renderModal() {
    if (!S.modal) return '';
    const db = DB.load();
    const { type, data } = S.modal;
    let body = '';

    if (type === 'add-kid' || type === 'edit-kid') {
        const e = type === 'edit-kid';
        body = `
        <h3 class="text-lg font-bold mb-4">${e ? 'Edit' : 'Add'} Kid</h3>
        <input id="k-name" placeholder="Name" value="${data.name||''}" class="mb-3">
        <input id="k-pin" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" value="${data.pin||''}" class="mb-4">
        <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Emoji <span style="font-size:20px;margin-left:6px">${S.selectedEmoji || data.emoji || '😀'}</span></p>
        <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:3px;max-height:150px;overflow-y:auto;border:1.5px solid #e5e7eb;border-radius:12px;padding:8px;margin-bottom:16px">
          ${KID_EMOJIS.map(em => {
            const sel = (S.selectedEmoji || data.emoji || '😀') === em;
            return `<button onclick="pickEmoji('${em}')" type="button"
              style="font-size:20px;width:36px;height:36px;border-radius:8px;border:2px solid ${sel?'#059669':'transparent'};background:${sel?'#ecfdf5':'transparent'}">
              ${em}</button>`;
          }).join('')}
        </div>
        <div class="flex gap-2 mt-1">
          <button onclick="closeModal()" class="btn-outline flex-1 py-2.5 text-sm">Cancel</button>
          <button onclick="${e ? `saveKid('${data.id}')` : 'addKid()'}" class="btn-primary flex-1 py-2.5 text-sm">${e ? 'Save' : 'Add'}</button>
        </div>`;
    }

    if (type === 'add-chore' || type === 'edit-chore') {
        const e = type === 'edit-chore';
        const selEmoji = S.selectedEmoji || data.emoji || '⭐';
        const emojiGrid = CHORE_EMOJIS.map(em => `
            <button onclick="pickEmoji('${em}')" type="button"
                style="font-size:22px;width:42px;height:42px;border-radius:10px;border:2px solid ${em===selEmoji?'#059669':'transparent'};background:${em===selEmoji?'#ecfdf5':'transparent'};transition:all 0.1s">
                ${em}
            </button>`).join('');
        body = `
        <h3 class="text-lg font-bold mb-3">${e ? 'Edit' : 'Add'} Chore</h3>
        <input id="c-name" placeholder="Chore name" value="${data.name||''}" class="mb-3">
        <input id="c-desc" placeholder="Description (optional)" value="${data.description||''}" class="mb-3">
        <div class="relative mb-3">
          <span class="absolute left-3 top-2.5 text-gray-400 text-sm">R</span>
          <input id="c-val" type="number" placeholder="Value" value="${data.value||''}" step="0.01" min="0" style="padding-left:28px">
        </div>
        <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Assigned to</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
          <button onclick="setAllKids()" type="button"
            style="padding:6px 12px;border-radius:10px;font-size:13px;font-weight:600;border:2px solid ${S.selectedKids==='all'?'#059669':'#e5e7eb'};background:${S.selectedKids==='all'?'#ecfdf5':'white'};color:${S.selectedKids==='all'?'#059669':'#6b7280'}">
            👨‍👩‍👧‍👦 All kids
          </button>
          ${db.kids.map(k => {
            const sel = Array.isArray(S.selectedKids) && S.selectedKids.includes(k.id);
            return `<button onclick="toggleKidAssignment('${k.id}')" type="button"
              style="padding:6px 12px;border-radius:10px;font-size:13px;font-weight:600;border:2px solid ${sel?'#059669':'#e5e7eb'};background:${sel?'#ecfdf5':'white'};color:${sel?'#059669':'#6b7280'}">
              ${kidIcon(k)} ${k.name}
            </button>`;
          }).join('')}
        </div>
        <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Schedule</p>
        <div class="flex gap-2 mb-3">
          <button onclick="setSchedule('daily')" type="button"
            style="flex:1;padding:8px;border-radius:12px;font-size:13px;font-weight:600;border:2px solid ${S.selectedSchedule==='daily'?'#059669':'#e5e7eb'};background:${S.selectedSchedule==='daily'?'#ecfdf5':'white'};color:${S.selectedSchedule==='daily'?'#059669':'#6b7280'}">
            📅 Daily
          </button>
          <button onclick="setSchedule('weekly')" type="button"
            style="flex:1;padding:8px;border-radius:12px;font-size:13px;font-weight:600;border:2px solid ${S.selectedSchedule==='weekly'?'#059669':'#e5e7eb'};background:${S.selectedSchedule==='weekly'?'#ecfdf5':'white'};color:${S.selectedSchedule==='weekly'?'#059669':'#6b7280'}">
            📆 Specific days
          </button>
        </div>
        ${S.selectedSchedule === 'weekly' ? `
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px">
          ${DAYS.map(d => {
            const sel = S.selectedDays.includes(d);
            return `<button onclick="toggleDay('${d}')" type="button"
              style="padding:6px 0;border-radius:10px;font-size:11px;font-weight:700;border:2px solid ${sel?'#059669':'#e5e7eb'};background:${sel?'#059669':'white'};color:${sel?'white':'#9ca3af'}">
              ${d}
            </button>`;
          }).join('')}
        </div>` : '<div style="margin-bottom:14px"></div>'}
        <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Emoji <span style="font-size:20px;margin-left:6px">${selEmoji}</span></p>
        <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:130px;overflow-y:auto;border:1.5px solid #e5e7eb;border-radius:12px;padding:8px;margin-bottom:16px">
          ${emojiGrid}
        </div>
        <div class="flex gap-2">
          <button onclick="closeModal()" class="btn-outline flex-1 py-2.5 text-sm">Cancel</button>
          <button onclick="${e ? `saveChore('${data.id}')` : 'addChore()'}" class="btn-primary flex-1 py-2.5 text-sm">${e ? 'Save' : 'Add'}</button>
        </div>`;
    }

    if (type === 'confirm-delete') {
        body = `
        <h3 class="text-lg font-bold mb-3">Are you sure?</h3>
        <p class="text-gray-500 text-sm mb-5">${data.msg}</p>
        <div class="flex gap-2">
          <button onclick="closeModal()" class="btn-outline flex-1 py-2.5 text-sm">Cancel</button>
          <button onclick="${data.onConfirm}" class="flex-1 py-2.5 text-sm font-semibold bg-red-500 text-white rounded-2xl">Delete</button>
        </div>`;
    }

    if (type === 'set-parent-pin') {
        const hasPin = !!currentUser?.user_metadata?.parent_pin;
        body = `
        <h3 class="text-lg font-bold mb-1">Parent PIN</h3>
        <p class="text-gray-400 text-sm mb-4">${hasPin ? '🔐 A PIN is currently set.' : '⚠️ No PIN set — anyone can access the parent dashboard.'}</p>
        <input id="pp-pin" placeholder="New 4-digit PIN" maxlength="4" inputmode="numeric" class="mb-4">
        <div class="flex gap-2">
          <button onclick="closeModal()" class="btn-outline flex-1 py-2.5 text-sm">Cancel</button>
          ${hasPin ? `<button onclick="removeParentPin()" class="flex-1 py-2.5 text-sm font-semibold border-1.5 border-red-200 text-red-400 rounded-2xl bg-red-50">Remove</button>` : ''}
          <button onclick="saveParentPin()" class="btn-primary flex-1 py-2.5 text-sm">Save PIN</button>
        </div>`;
    }

    if (type === 'payout') {
        const kid = db.kids.find(k => k.id === data.kidId);
        body = `
        <h3 class="text-lg font-bold mb-1">Pay Out</h3>
        <p class="text-gray-400 text-sm mb-4">${kid?.name} · Balance: ${R(kid?.balance)}</p>
        <div class="relative mb-4">
          <span class="absolute left-3 top-2.5 text-gray-400 text-sm">R</span>
          <input type="number" id="m-po-amt" placeholder="0.00" step="0.01" min="0" style="padding-left:28px">
        </div>
        <div class="flex gap-2">
          <button onclick="closeModal()" class="btn-outline flex-1 py-2.5 text-sm">Cancel</button>
          <button onclick="doModalPayout('${data.kidId}')" class="btn-primary flex-1 py-2.5 text-sm">Pay Out</button>
        </div>`;
    }

    return `
    <div class="fixed inset-0 bg-black/40 flex items-end justify-center z-50" onclick="if(event.target===this)closeModal()">
      <div class="bg-white rounded-t-3xl p-6 w-full max-w-sm">${body}</div>
    </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────
async function addKid() {
    const name  = document.getElementById('k-name').value.trim();
    const pin   = document.getElementById('k-pin').value.trim();
    const emoji = S.selectedEmoji || '😀';
    if (!name)                 return toast('⚠️ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits (e.g. 1234).');
    const id = uid();
    const { error } = await sb.from('kids').insert({ id, user_id: currentUser.id, name, pin, emoji, balance: 0 });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.kids.push({ id, name, pin, emoji, balance: 0 });
    closeModal(); toast(`${name} added! 🎉`);
}
function editKid(id) {
    const k = cache.kids.find(x => x.id === id);
    if (k) openModal('edit-kid', { ...k });
}
async function saveKid(id) {
    const name  = document.getElementById('k-name').value.trim();
    const pin   = document.getElementById('k-pin').value.trim();
    const emoji = S.selectedEmoji || '😀';
    if (!name)                 return toast('⚠️ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits (e.g. 1234).');
    const { error } = await sb.from('kids').update({ name, pin, emoji }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save.');
    const k = cache.kids.find(x => x.id === id);
    if (k) { k.name = name; k.pin = pin; k.emoji = emoji; }
    closeModal(); toast('Saved!');
}
function deleteKid(id) {
    const k = cache.kids.find(x => x.id === id);
    openModal('confirm-delete', { msg: `Remove ${k?.name}? All their data will be deleted.`, onConfirm: `doDeleteKid('${id}')` });
}
async function doDeleteKid(id) {
    const { error } = await sb.from('kids').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.kids         = cache.kids.filter(x => x.id !== id);
    cache.completions  = cache.completions.filter(x => x.kidId !== id);
    cache.transactions = cache.transactions.filter(x => x.kidId !== id);
    closeModal(); render();
}

async function addChore() {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || '⭐';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('⚠️ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('⚠️ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('⚠️ Please select at least one kid.');
    const id = uid();
    const { error } = await sb.from('chores').insert({ id, user_id: currentUser.id, name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.chores.push({ id, name, description: desc, value: val, assignedTo, emoji, schedule, days });
    closeModal(); toast('Chore added!');
}
function editChore(id) {
    const c = cache.chores.find(x => x.id === id);
    if (c) openModal('edit-chore', { ...c });
}
async function saveChore(id) {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || '⭐';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('⚠️ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('⚠️ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('⚠️ Please select at least one kid.');
    const { error } = await sb.from('chores').update({ name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save.');
    const c = cache.chores.find(x => x.id === id);
    if (c) { c.name = name; c.description = desc; c.value = val; c.assignedTo = assignedTo; c.emoji = emoji; c.schedule = schedule; c.days = days; }
    closeModal(); toast('Saved!');
}
function deleteChore(id) {
    openModal('confirm-delete', { msg: 'Delete this chore?', onConfirm: `doDeleteChore('${id}')` });
}
async function doDeleteChore(id) {
    const { error } = await sb.from('chores').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.chores = cache.chores.filter(x => x.id !== id);
    closeModal(); render();
}

async function approveChore(cid) {
    const comp  = cache.completions.find(x => x.id === cid);
    if (!comp) return;
    const chore = cache.chores.find(x => x.id === comp.choreId);
    const kid   = cache.kids.find(x => x.id === comp.kidId);
    await sb.from('completions').update({ approved: true }).eq('id', cid).eq('user_id', currentUser.id);
    comp.approved = true;
    if (chore && kid) {
        const newBalance = (kid.balance || 0) + chore.value;
        const txId = uid();
        const txCreatedAt = new Date().toISOString();
        await sb.from('kids').update({ balance: newBalance }).eq('id', kid.id).eq('user_id', currentUser.id);
        await sb.from('transactions').insert({ id: txId, user_id: currentUser.id, kid_id: kid.id, amount: chore.value, type: 'chore', description: chore.name, created_at: txCreatedAt });
        kid.balance = newBalance;
        cache.transactions.push({ id: txId, kidId: kid.id, amount: chore.value, type: 'chore', description: chore.name, createdAt: txCreatedAt });
    }
    toast(`✓ Approved! ${R(chore?.value)} added to ${kid?.name}.`);
}
async function rejectChore(cid) {
    await sb.from('completions').update({ rejected: true }).eq('id', cid).eq('user_id', currentUser.id);
    const c = cache.completions.find(x => x.id === cid);
    if (c) c.rejected = true;
    render();
}
async function markDone(choreId) {
    const id = uid();
    const completedAt = new Date().toISOString();
    const { error } = await sb.from('completions').insert({ id, user_id: currentUser.id, chore_id: choreId, kid_id: S.kidId, completed_at: completedAt, approved: false, rejected: false });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.completions.push({ id, choreId, kidId: S.kidId, completedAt, approved: false, rejected: false });
    toast('Marked as done! Waiting for parent to approve. ⏳');
}
async function recordPayout() {
    const kidId  = document.getElementById('po-kid').value;
    const amount = parseFloat(document.getElementById('po-amount').value) || 0;
    if (!kidId)    return toast('⚠️ Please select a kid.');
    if (amount<=0) return toast('⚠️ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    document.getElementById('po-kid').value = '';
    document.getElementById('po-amount').value = '';
    toast(`${R(amount)} payout recorded for ${k.name}.`);
}
async function doModalPayout(kidId) {
    const amount = parseFloat(document.getElementById('m-po-amt').value) || 0;
    if (amount<=0) return toast('⚠️ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    closeModal(); toast(`${R(amount)} payout recorded for ${k.name}.`);
}

async function saveCurrency(code) {
    const { data, error } = await sb.auth.updateUser({ data: { currency: code } });
    if (error) return toast('❌ Could not save setting.');
    if (data?.user) currentUser = data.user;
    render();
    toast('Currency updated!');
}

async function saveParentPin() {
    const pin = document.getElementById('pp-pin').value.trim();
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits.');
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: pin } });
    if (error) return toast('❌ Could not save PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN saved! 🔐');
}
async function removeParentPin() {
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: null } });
    if (error) return toast('❌ Could not remove PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN removed.');
}

// ─── RENDER ──────────────────────────────────────────────────────
function render() {
    const toastHtml = S.toast
        ? `<div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-5 py-2.5 rounded-2xl shadow-lg z-50 max-w-xs text-center">${S.toast}</div>`
        : '';
    if (!currentUser) {
        document.getElementById('app').innerHTML = vLogin() + toastHtml;
        return;
    }
    const views = { home: vHome, parent: vParent, 'kid-pin': vKidPin, kid: vKid, 'parent-pin': vParentPin };
    const html  = (views[S.view] || vHome)();
    document.getElementById('app').innerHTML = html + renderModal() + toastHtml;
}

initApp();
</script>
</body>
</html>
