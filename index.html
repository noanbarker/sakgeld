const NO_DECIMAL_CURRENCIES = ['JPY','KRW','VND','IDR','HUF','UGX','TZS'];

function weekStart() {
    const d = new Date(); const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    const mon = new Date(d); mon.setDate(d.getDate() + diff); mon.setHours(0,0,0,0); return mon;
}
function weeklyEarned(db, kidId) {
    const mon = weekStart();
    return db.transactions
        .filter(t => t.kidId === kidId && t.type === 'chore' && new Date(t.createdAt) >= mon)
        .reduce((s, t) => s + t.amount, 0);
}
function weeklyPossible(db, kidId) {
    return db.chores
        .filter(c => choreAssignedTo(c, kidId))
        .reduce((s, c) => {
            const freq = (!c.schedule || c.schedule === 'daily') ? 7 : (c.days || []).length;
            return s + (c.value * freq);
        }, 0);
}
function choreScheduleLabel(c) {
    if (!c.schedule || c.schedule === 'daily') return 'Daily';
    if (!c.days || c.days.length === 0) return 'No days set';
    if (c.days.length === 7) return 'Daily';
    return c.days.join(', ');
}
function choreIsForToday(c) {
    if (!c.schedule || c.schedule === 'daily') return true;
    const today = DAYS[(new Date().getDay() + 6) % 7];
    return (c.days || []).includes(today);
}
function choreAssignedTo(c, kidId) {
    if (!c.assignedTo || c.assignedTo === 'all') return true;
    if (Array.isArray(c.assignedTo)) return c.assignedTo.includes(kidId);
    return c.assignedTo === kidId;
}
function choreAssignmentLabel(c, kids) {
    if (!c.assignedTo || c.assignedTo === 'all') return 'All kids';
    if (Array.isArray(c.assignedTo)) {
        if (c.assignedTo.length === kids.length) return 'All kids';
        return c.assignedTo.map(id => kids.find(k => k.id === id)?.name || '?').join(', ');
    }
    return kids.find(k => k.id === c.assignedTo)?.name || '?';
}

    S.selectedColor    = data.color_key || 'blue';
    S.selectedSchedule = data.schedule  || 'daily';
    S.selectedDays     = data.days      ? [...data.days] : [];
    S.selectedKids     = !data.assignedTo || data.assignedTo === 'all' ? 'all'
                       : Array.isArray(data.assignedTo) ? [...data.assignedTo]
                       : [data.assignedTo];
    S.modal = { type, data }; render();
}
function pickKidColor(key) { snapModalInputs(); S.selectedColor = key; render(); }
function closeModal() { S.modal = null; render(); }

function snapModalInputs() {
    if (!S.modal) return;
    const t = S.modal.type;
    if (t === 'add-chore' || t === 'edit-chore') {
        const n = document.getElementById('c-name');
        const d = document.getElementById('c-desc');
        const v = document.getElementById('c-val');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, description: d?.value, value: v?.value };
    }
    if (t === 'add-kid' || t === 'edit-kid') {
        const n = document.getElementById('k-name');
        const p = document.getElementById('k-pin');
        if (n) S.modal.data = { ...S.modal.data, name: n.value, pin: p?.value };
    }
}
function pickEmoji(em) { snapModalInputs(); S.selectedEmoji = em; render(); }
function setSchedule(s) { snapModalInputs(); S.selectedSchedule = s; render(); }
function setAllKids() { snapModalInputs(); S.selectedKids = 'all'; render(); }
function toggleKidAssignment(id) {
    snapModalInputs();
    if (S.selectedKids === 'all') { S.selectedKids = [id]; render(); return; }
    const arr = Array.isArray(S.selectedKids) ? [...S.selectedKids] : [];
    const i = arr.indexOf(id);
    if (i === -1) arr.push(id); else arr.splice(i, 1);
    S.selectedKids = arr.length === 0 ? 'all' : arr;
    render();
}
function toggleDay(d) {
    snapModalInputs();
    const i = S.selectedDays.indexOf(d);
    if (i === -1) S.selectedDays.push(d); else S.selectedDays.splice(i, 1);
    render();
}

async function doSignIn() {
    const email = document.getElementById('l-email')?.value?.trim();
    const pass  = document.getElementById('l-pass')?.value;
    const errEl = document.getElementById('l-err');
    if (!email || !pass) { if (errEl) errEl.textContent = 'Please enter email and password.'; return; }
    if (errEl) errEl.textContent = 'Signing in…';
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error && errEl) errEl.textContent = error.message;
}
async function doSignUp() {
    const email = document.getElementById('l-email')?.value?.trim();
    const pass  = document.getElementById('l-pass')?.value;
    const errEl = document.getElementById('l-err');
    if (!email || !pass) { if (errEl) errEl.textContent = 'Please enter email and password.'; return; }
    if (errEl) errEl.textContent = 'Creating account…';
    const { error } = await sb.auth.signUp({ email, password: pass });
    if (error) { if (errEl) errEl.textContent = error.message; }
    else { toast('Account created! Check your email to confirm, then sign in.'); }
}

function pinPress(k) {
    if (k === '⌫') { S.pin = S.pin.slice(0,-1); render(); return; }
    if (S.pin.length >= 4) return;
    S.pin += k; render();
    if (S.pin.length === 4) setTimeout(checkPin, 120);
}
function checkPin() {
    const db = DB.load();
    const kid = db.kids.find(k => k.id === S.pinKidId);
    if (kid && S.pin === kid.pin) {

    } else {

        if (el) el.textContent = 'Wrong PIN. Try again.';
        setTimeout(() => { S.pin = ''; render(); }, 900);
    }
}

        const emojiGrid = CHORE_EMOJIS.map(em => `
            <button onclick="pickEmoji('${em}')" type="button"
                style="font-size:22px;width:42px;height:42px;border-radius:10px;border:2px solid ${em===selEmoji?'var(--color-blue)':'transparent'};background:${em===selEmoji?'var(--color-blue-bg)':'transparent'};transition:all 0.1s;cursor:pointer">
                ${em}
            </button>`).join('');
        body = `
        <h3 style="font-family:var(--font-family);font-size:18px;font-weight:800;color:var(--color-text-primary);margin-bottom:12px">${e ? 'Edit' : 'Add'} Chore</h3>
        <input id="c-name" placeholder="Chore name" value="${data.name||''}" class="mb-3">
        <input id="c-desc" placeholder="Description (optional)" value="${data.description||''}" class="mb-3">
        <div class="relative mb-3">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--color-text-secondary);font-size:15px;line-height:1;pointer-events:none">${currSymbol()}</span>
          <input id="c-val" type="number" placeholder="Value" value="${data.value||''}" step="0.01" min="0" style="padding-left:38px !important">
        </div>
        <p style="font-family:var(--font-family);font-size:10px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:8px">Assigned to</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
          <button onclick="setAllKids()" type="button"
            style="padding:6px 12px;border-radius:10px;font-size:13px;font-weight:700;font-family:var(--font-family);border:2px solid ${S.selectedKids==='all'?'var(--color-blue)':'var(--color-border)'};background:${S.selectedKids==='all'?'var(--color-blue-bg)':'white'};color:${S.selectedKids==='all'?'var(--color-blue)':'#6b7280'};cursor:pointer">
            👨‍👩‍👧‍👦 All kids
          </button>
          ${db.kids.map(k => {
            const sel = Array.isArray(S.selectedKids) && S.selectedKids.includes(k.id);
            return `<button onclick="toggleKidAssignment('${k.id}')" type="button"
              style="padding:6px 12px;border-radius:10px;font-size:13px;font-weight:700;font-family:var(--font-family);border:2px solid ${sel?'var(--color-blue)':'var(--color-border)'};background:${sel?'var(--color-blue-bg)':'white'};color:${sel?'var(--color-blue)':'#6b7280'};cursor:pointer">
              ${kidIcon(k)} ${k.name}
            </button>`;
          }).join('')}
        </div>
        <p style="font-family:var(--font-family);font-size:10px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:8px">Schedule</p>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button onclick="setSchedule('daily')" type="button"
            style="flex:1;padding:8px;border-radius:12px;font-size:13px;font-weight:700;font-family:var(--font-family);border:2px solid ${S.selectedSchedule==='daily'?'var(--color-blue)':'var(--color-border)'};background:${S.selectedSchedule==='daily'?'var(--color-blue-bg)':'white'};color:${S.selectedSchedule==='daily'?'var(--color-blue)':'#6b7280'};cursor:pointer">
            📅 Daily
          </button>
          <button onclick="setSchedule('weekly')" type="button"
            style="flex:1;padding:8px;border-radius:12px;font-size:13px;font-weight:700;font-family:var(--font-family);border:2px solid ${S.selectedSchedule==='weekly'?'var(--color-blue)':'var(--color-border)'};background:${S.selectedSchedule==='weekly'?'var(--color-blue-bg)':'white'};color:${S.selectedSchedule==='weekly'?'var(--color-blue)':'#6b7280'};cursor:pointer">
            📆 Specific days
          </button>
        </div>
        ${S.selectedSchedule === 'weekly' ? `
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px">
          ${DAYS.map(d => {
            const sel = S.selectedDays.includes(d);
            return `<button onclick="toggleDay('${d}')" type="button"
              style="padding:6px 0;border-radius:10px;font-size:11px;font-weight:700;font-family:var(--font-family);border:2px solid ${sel?'var(--color-blue)':'var(--color-border)'};background:${sel?'var(--color-blue)':'white'};color:${sel?'white':'#9ca3af'};cursor:pointer">
              ${d}
            </button>`;
          }).join('')}
        </div>` : '<div style="margin-bottom:14px"></div>'}
        <p style="font-family:var(--font-family);font-size:10px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:8px">Emoji <span style="font-size:20px;margin-left:6px;letter-spacing:0">${selEmoji}</span></p>
        <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:130px;overflow-y:auto;border:1.5px solid var(--color-border);border-radius:12px;padding:8px;margin-bottom:16px">
          ${emojiGrid}
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="closeModal()" class="btn-outline flex-1" style="padding:10px">Cancel</button>
          <button onclick="${e ? `saveChore('${data.id}')` : 'addChore()'}" class="btn-primary flex-1" style="padding:10px">${e ? 'Save' : 'Add'}</button>
        </div>`;
    }

    if (type === 'confirm-delete') {
        body = `
        <h3 style="font-family:var(--font-family);font-size:18px;font-weight:800;color:var(--color-text-primary);margin-bottom:12px">Are you sure?</h3>
        <p style="font-family:var(--font-family);color:var(--color-text-secondary);font-size:14px;margin-bottom:20px">${data.msg}</p>
        <div style="display:flex;gap:8px">
          <button onclick="closeModal()" class="btn-outline flex-1" style="padding:10px">Cancel</button>
          <button onclick="${data.onConfirm}" style="flex:1;padding:10px;font-family:var(--font-family);font-size:14px;font-weight:700;background:var(--color-coral);color:white;border:none;border-radius:var(--radius-lg);cursor:pointer">Delete</button>
        </div>`;
    }

    if (type === 'set-parent-pin') {
        const hasPin = !!currentUser?.user_metadata?.parent_pin;
        body = `
        <h3 style="font-family:var(--font-family);font-size:18px;font-weight:800;color:var(--color-text-primary);margin-bottom:4px">Parent PIN</h3>
        <p style="font-family:var(--font-family);color:var(--color-text-secondary);font-size:14px;margin-bottom:16px">${hasPin ? '🔐 A PIN is currently set.' : '⚠️ No PIN set — anyone can access the parent dashboard.'}</p>
        <input id="pp-pin" placeholder="New 4-digit PIN" maxlength="4" inputmode="numeric" class="mb-4">
        <div style="display:flex;gap:8px">
          <button onclick="closeModal()" class="btn-outline flex-1" style="padding:10px">Cancel</button>
          ${hasPin ? `<button onclick="removeParentPin()" style="flex:1;padding:10px;font-family:var(--font-family);font-size:14px;font-weight:700;border:1.5px solid var(--color-coral-border);color:var(--color-coral-text);border-radius:var(--radius-lg);background:var(--color-coral-bg);cursor:pointer">Remove</button>` : ''}
          <button onclick="saveParentPin()" class="btn-primary flex-1" style="padding:10px">Save PIN</button>
        </div>`;
    }

    if (type === 'payout') {
        const kid = db.kids.find(k => k.id === data.kidId);
        body = `
        <h3 style="font-family:var(--font-family);font-size:18px;font-weight:800;color:var(--color-text-primary);margin-bottom:4px">Pay Out</h3>
        <p style="font-family:var(--font-family);color:var(--color-text-secondary);font-size:14px;margin-bottom:16px">${kid?.name} · Balance: ${R(kid?.balance)}</p>
        <div class="relative mb-4">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--color-text-secondary);font-size:15px;line-height:1;pointer-events:none">${currSymbol()}</span>
          <input type="number" id="m-po-amt" placeholder="0.00" step="0.01" min="0" style="padding-left:38px !important">
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="closeModal()" class="btn-outline flex-1" style="padding:10px">Cancel</button>
          <button onclick="doModalPayout('${data.kidId}')" class="btn-primary flex-1" style="padding:10px">Pay Out</button>
        </div>`;
    }

    return `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:50" onclick="if(event.target===this)closeModal()">
      <div style="background:var(--color-surface);border-radius:32px 32px 0 0;padding:28px 24px 36px;width:100%;max-width:440px">${body}</div>
    </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────
async function addKid() {
    const name      = document.getElementById('k-name').value.trim();
    const pin       = document.getElementById('k-pin').value.trim();
    const emoji     = S.selectedEmoji || '😀';
    const color_key = S.selectedColor || 'blue';
    if (!name)                 return toast('⚠️ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits (e.g. 1234).');
    const id = uid();
    const { error } = await sb.from('kids').insert({ id, user_id: currentUser.id, name, pin, emoji, color_key, balance: 0 });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.kids.push({ id, name, pin, emoji, color_key, balance: 0 });
    closeModal(); toast(`${name} added! 🎉`);
}
function editKid(id) {
    const k = cache.kids.find(x => x.id === id);
    if (k) openModal('edit-kid', { ...k });
}
async function saveKid(id) {
    const name      = document.getElementById('k-name').value.trim();
    const pin       = document.getElementById('k-pin').value.trim();
    const emoji     = S.selectedEmoji || '😀';
    const color_key = S.selectedColor || 'blue';
    if (!name)                 return toast('⚠️ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits (e.g. 1234).');
    const { error } = await sb.from('kids').update({ name, pin, emoji, color_key }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save.');
    const k = cache.kids.find(x => x.id === id);
    if (k) { k.name = name; k.pin = pin; k.emoji = emoji; k.color_key = color_key; }
    closeModal(); toast('Saved!');
}
function deleteKid(id) {
    const k = cache.kids.find(x => x.id === id);
    openModal('confirm-delete', { msg: `Remove ${k?.name}? All their data will be deleted.`, onConfirm: `doDeleteKid('${id}')` });
}
async function doDeleteKid(id) {
    const { error } = await sb.from('kids').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.kids         = cache.kids.filter(x => x.id !== id);
    cache.completions  = cache.completions.filter(x => x.kidId !== id);
    cache.transactions = cache.transactions.filter(x => x.kidId !== id);
    closeModal(); render();
}

async function addChore() {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || '⭐';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('⚠️ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('⚠️ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('⚠️ Please select at least one kid.');
    const id = uid();
    const { error } = await sb.from('chores').insert({ id, user_id: currentUser.id, name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.chores.push({ id, name, description: desc, value: val, assignedTo, emoji, schedule, days });
    closeModal(); toast('Chore added!');
}
function editChore(id) {
    const c = cache.chores.find(x => x.id === id);
    if (c) openModal('edit-chore', { ...c });
}
async function saveChore(id) {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || '⭐';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('⚠️ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('⚠️ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('⚠️ Please select at least one kid.');
    const { error } = await sb.from('chores').update({ name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save.');
    const c = cache.chores.find(x => x.id === id);
    if (c) { c.name = name; c.description = desc; c.value = val; c.assignedTo = assignedTo; c.emoji = emoji; c.schedule = schedule; c.days = days; }
    closeModal(); toast('Saved!');
}
function deleteChore(id) {
    openModal('confirm-delete', { msg: 'Delete this chore?', onConfirm: `doDeleteChore('${id}')` });
}
async function doDeleteChore(id) {
    const { error } = await sb.from('chores').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.chores = cache.chores.filter(x => x.id !== id);
    closeModal(); render();
}

async function approveChore(cid) {
    const comp  = cache.completions.find(x => x.id === cid);
    if (!comp) return;
    const chore = cache.chores.find(x => x.id === comp.choreId);
    const kid   = cache.kids.find(x => x.id === comp.kidId);
    await sb.from('completions').update({ approved: true }).eq('id', cid).eq('user_id', currentUser.id);
    comp.approved = true;
    if (chore && kid) {
        const newBalance = (kid.balance || 0) + chore.value;
        const txId = uid();
        const txCreatedAt = new Date().toISOString();
        await sb.from('kids').update({ balance: newBalance }).eq('id', kid.id).eq('user_id', currentUser.id);
        await sb.from('transactions').insert({ id: txId, user_id: currentUser.id, kid_id: kid.id, amount: chore.value, type: 'chore', description: chore.name, created_at: txCreatedAt });
        kid.balance = newBalance;
        cache.transactions.push({ id: txId, kidId: kid.id, amount: chore.value, type: 'chore', description: chore.name, createdAt: txCreatedAt });
    }
    toast(`✓ Approved! ${R(chore?.value)} added to ${kid?.name}.`);
}
async function rejectChore(cid) {
    await sb.from('completions').update({ rejected: true }).eq('id', cid).eq('user_id', currentUser.id);
    const c = cache.completions.find(x => x.id === cid);
    if (c) c.rejected = true;
    render();
}
async function markDone(choreId) {
    const id = uid();
    const completedAt = new Date().toISOString();
    const { error } = await sb.from('completions').insert({ id, user_id: currentUser.id, chore_id: choreId, kid_id: S.kidId, completed_at: completedAt, approved: false, rejected: false });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.completions.push({ id, choreId, kidId: S.kidId, completedAt, approved: false, rejected: false });
    toast('Marked as done! Waiting for parent to approve. ⏳');
}
async function recordPayout() {
    const kidId  = document.getElementById('po-kid').value;
    const amount = parseFloat(document.getElementById('po-amount').value) || 0;
    if (!kidId)    return toast('⚠️ Please select a kid.');
    if (amount<=0) return toast('⚠️ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    document.getElementById('po-kid').value = '';
    document.getElementById('po-amount').value = '';
    toast(`${R(amount)} payout recorded for ${k.name}.`);
}
async function doModalPayout(kidId) {
    const amount = parseFloat(document.getElementById('m-po-amt').value) || 0;
    if (amount<=0) return toast('⚠️ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    closeModal(); toast(`${R(amount)} payout recorded for ${k.name}.`);
}

async function saveCurrency(code) {
    const { data, error } = await sb.auth.updateUser({ data: { currency: code } });
    if (error) return toast('❌ Could not save setting.');
    if (data?.user) currentUser = data.user;
    render();
    toast('Currency updated!');
}

async function saveParentPin() {
    const pin = document.getElementById('pp-pin').value.trim();
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits.');
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: pin } });
    if (error) return toast('❌ Could not save PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN saved! 🔐');
}
async function removeParentPin() {
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: null } });
    if (error) return toast('❌ Could not remove PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN removed.');
}

// ─── RENDER ──────────────────────────────────────────────────────
function render() {
    const toastHtml = S.toast
        ? `<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;font-family:var(--font-family);font-size:14px;font-weight:600;padding:10px 20px;border-radius:var(--radius-full);box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:99;max-width:320px;text-align:center">${S.toast}</div>`
        : '';
    if (!currentUser) {
        document.getElementById('app').innerHTML = vLogin() + toastHtml;
        return;
    }
    const views = { home: vHome, parent: vParent, 'kid-pin': vKidPin, kid: vKid, 'parent-pin': vParentPin };
    const html  = (views[S.view] || vHome)();
    document.getElementById('app').innerHTML = html + renderModal() + toastHtml;
}

initApp();
</script>
</body>
</html>
