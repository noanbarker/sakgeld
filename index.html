// ─── ACTIONS ─────────────────────────────────────────────────────
async function addKid() {
    const name      = document.getElementById('k-name').value.trim();
    const pin       = document.getElementById('k-pin').value.trim();
    const emoji     = S.selectedEmoji || '😀';
    const color_key = S.selectedColor || 'blue';
    if (!name)                 return toast('⚠️ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits (e.g. 1234).');
    const id = uid();
    const { error } = await sb.from('kids').insert({ id, user_id: currentUser.id, name, pin, emoji, color_key, balance: 0 });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.kids.push({ id, name, pin, emoji, color_key, balance: 0 });
    closeModal(); toast(`${name} added! 🎉`);
}
function editKid(id) {
    const k = cache.kids.find(x => x.id === id);
    if (k) openModal('edit-kid', { ...k });
}
async function saveKid(id) {
    const name      = document.getElementById('k-name').value.trim();
    const pin       = document.getElementById('k-pin').value.trim();
    const emoji     = S.selectedEmoji || '😀';
    const color_key = S.selectedColor || 'blue';
    if (!name)                 return toast('⚠️ Please enter a name.');
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits (e.g. 1234).');
    const { error } = await sb.from('kids').update({ name, pin, emoji, color_key }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save.');
    const k = cache.kids.find(x => x.id === id);
    if (k) { k.name = name; k.pin = pin; k.emoji = emoji; k.color_key = color_key; }
    closeModal(); toast('Saved!');
}
function deleteKid(id) {
    const k = cache.kids.find(x => x.id === id);
    openModal('confirm-delete', { msg: `Remove ${k?.name}? All their data will be deleted.`, onConfirm: `doDeleteKid('${id}')` });
}
async function doDeleteKid(id) {
    const { error } = await sb.from('kids').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.kids         = cache.kids.filter(x => x.id !== id);
    cache.completions  = cache.completions.filter(x => x.kidId !== id);
    cache.transactions = cache.transactions.filter(x => x.kidId !== id);
    closeModal(); render();
}

async function addChore() {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || '⭐';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('⚠️ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('⚠️ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('⚠️ Please select at least one kid.');
    const id = uid();
    const { error } = await sb.from('chores').insert({ id, user_id: currentUser.id, name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.chores.push({ id, name, description: desc, value: val, assignedTo, emoji, schedule, days });
    closeModal(); toast('Chore added!');
}
function editChore(id) {
    const c = cache.chores.find(x => x.id === id);
    if (c) openModal('edit-chore', { ...c });
}
async function saveChore(id) {
    const name       = document.getElementById('c-name').value.trim();
    const desc       = document.getElementById('c-desc').value.trim();
    const val        = parseFloat(document.getElementById('c-val').value) || 0;
    const assignedTo = S.selectedKids;
    const emoji      = S.selectedEmoji || '⭐';
    const schedule   = S.selectedSchedule || 'daily';
    const days       = schedule === 'weekly' ? [...S.selectedDays] : [];
    if (!name) return toast('⚠️ Please enter a chore name.');
    if (schedule === 'weekly' && days.length === 0) return toast('⚠️ Please select at least one day.');
    if (Array.isArray(assignedTo) && assignedTo.length === 0) return toast('⚠️ Please select at least one kid.');
    const { error } = await sb.from('chores').update({ name, description: desc, value: val, assigned_to: assignedTo, emoji, schedule, days }).eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save.');
    const c = cache.chores.find(x => x.id === id);
    if (c) { c.name = name; c.description = desc; c.value = val; c.assignedTo = assignedTo; c.emoji = emoji; c.schedule = schedule; c.days = days; }
    closeModal(); toast('Saved!');
}
function deleteChore(id) {
    openModal('confirm-delete', { msg: 'Delete this chore?', onConfirm: `doDeleteChore('${id}')` });
}
function setAdjustType(t) {
    snapModalInputs();
    S.modal.data = { ...S.modal.data, adjustType: t };
    render();
}
async function saveManualAdjustment(kidId) {
    const amount = parseFloat(document.getElementById('ma-amount').value) || 0;
    const desc   = document.getElementById('ma-desc').value.trim();
    const isAdd  = (S.modal.data.adjustType || 'add') === 'add';
    if (amount <= 0) return toast('⚠️ Please enter a valid amount.');
    if (!desc)       return toast('⚠️ Please enter a reason.');
    const kid = cache.kids.find(x => x.id === kidId);
    if (!kid) return;
    const delta      = isAdd ? amount : -amount;
    const newBalance = (kid.balance || 0) + delta;
    const id         = uid();
    const createdAt  = new Date().toISOString();
    const { error } = await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not save. Check your connection.');
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: delta, type: 'manual', description: desc, created_at: createdAt });
    kid.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: delta, type: 'manual', description: desc, createdAt });
    closeModal();
    toast(isAdd ? `${R(amount)} added to ${kid.name}'s balance.` : `${R(amount)} deducted from ${kid.name}'s balance.`);
    if (isAdd) await checkBonusMilestones(kidId, newBalance);
}
function pickQuickTaskKid(id) {
    snapModalInputs();
    if (S.selectedKids === 'all') { S.selectedKids = [id]; render(); return; }
    const arr = Array.isArray(S.selectedKids) ? [...S.selectedKids] : [];
    const i = arr.indexOf(id);
    if (i === -1) arr.push(id); else arr.splice(i, 1);
    S.selectedKids = arr;
    render();
}
async function addQuickTask() {
    const name      = document.getElementById('qt-name').value.trim();
    const val       = parseFloat(document.getElementById('qt-val').value) || 0;
    const assignedTo = S.selectedKids;
    if (!name) return toast('⚠️ Please enter a task name.');
    if (!assignedTo || (Array.isArray(assignedTo) && assignedTo.length === 0)) return toast('⚠️ Please select at least one kid.');
    const expiresOn = toLocalDateStr(new Date());
    const id = uid();
    const { error } = await sb.from('chores').insert({ id, user_id: currentUser.id, name, description: '', value: val, assigned_to: assignedTo, emoji: '⭐', schedule: 'daily', days: [], one_off: true, expires_on: expiresOn });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.chores.push({ id, name, description: '', value: val, assignedTo, emoji: '⭐', schedule: 'daily', days: [], oneOff: true, expiresOn });
    closeModal(); toast('Quick task assigned! 🎯');
}
async function doDeleteChore(id) {
    const { error } = await sb.from('chores').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.chores = cache.chores.filter(x => x.id !== id);
    closeModal(); render();
}

function pickBonusKid(id) {
    snapModalInputs();
    if (S.selectedKids === 'all') { S.selectedKids = [id]; render(); return; }
    const arr = Array.isArray(S.selectedKids) ? [...S.selectedKids] : [];
    const i = arr.indexOf(id);
    if (i === -1) arr.push(id); else arr.splice(i, 1);
    S.selectedKids = arr;
    render();
}
async function saveBonusMilestone(editId) {
    const name      = document.getElementById('bm-name').value.trim();
    const threshold = parseFloat(document.getElementById('bm-threshold').value) || 0;
    const bonusAmt  = parseFloat(document.getElementById('bm-bonus').value) || 0;
    const assignedTo = S.selectedKids;
    if (threshold <= 0) return toast('⚠️ Please enter a balance target.');
    if (bonusAmt  <= 0) return toast('⚠️ Please enter a bonus amount.');
    if (!assignedTo || (Array.isArray(assignedTo) && assignedTo.length === 0)) return toast('⚠️ Please select at least one kid.');
    if (editId && editId !== 'null') {
        const m = cache.bonusMilestones.find(x => x.id === editId);
        if (!m) return;
        await sb.from('bonus_milestones').update({ name, threshold, bonus_amount: bonusAmt, assigned_to: assignedTo }).eq('id', editId).eq('user_id', currentUser.id);
        m.name = name; m.threshold = threshold; m.bonusAmount = bonusAmt; m.assignedTo = assignedTo;
        closeModal(); toast('Milestone updated.');
    } else {
        const id = uid(); const createdAt = new Date().toISOString();
        const { error } = await sb.from('bonus_milestones').insert({ id, user_id: currentUser.id, name, threshold, bonus_amount: bonusAmt, assigned_to: assignedTo, claimed_by: [], created_at: createdAt });
        if (error) return toast('❌ ' + (error.message || 'Could not save.'));
        cache.bonusMilestones.push({ id, name, threshold, bonusAmount: bonusAmt, assignedTo, claimedBy: [], createdAt });
        closeModal(); toast('Milestone added! 🌟');
    }
}
async function deleteBonusMilestone(id) {
    openModal('confirm-delete', { msg: 'Delete this bonus milestone? Kids who already claimed it keep their bonus.', onConfirm: `doDeleteBonusMilestone('${id}')` });
}
async function doDeleteBonusMilestone(id) {
    const { error } = await sb.from('bonus_milestones').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) return toast('❌ Could not delete.');
    cache.bonusMilestones = cache.bonusMilestones.filter(x => x.id !== id);
    closeModal(); render();
}
async function checkBonusMilestones(kidId, newBalance) {
    const eligible = (cache.bonusMilestones || []).filter(m => {
        const applies = m.assignedTo === 'all' || (Array.isArray(m.assignedTo) && m.assignedTo.includes(kidId));
        const claimed = (m.claimedBy || []).some(c => c.kidId === kidId);
        return applies && !claimed && newBalance >= m.threshold;
    });
    if (!eligible.length) return;
    const kid = cache.kids.find(k => k.id === kidId);
    if (!kid) return;
    const now = new Date().toISOString();
    let bonusTotal = 0;
    const txInserts = [];
    for (const m of eligible) {
        const newClaimed = [...(m.claimedBy || []), { kidId, claimedAt: now }];
        await sb.from('bonus_milestones').update({ claimed_by: newClaimed }).eq('id', m.id).eq('user_id', currentUser.id);
        m.claimedBy = newClaimed;
        bonusTotal += m.bonusAmount;
        const txId = uid();
        txInserts.push({ id: txId, user_id: currentUser.id, kid_id: kidId, amount: m.bonusAmount, type: 'bonus', description: `Bonus: ${m.name || 'Balance milestone'} (${R(m.threshold)})`, created_at: now });
        cache.transactions.push({ id: txId, kidId, amount: m.bonusAmount, type: 'bonus', description: `Bonus: ${m.name || 'Balance milestone'} (${R(m.threshold)})`, createdAt: now });
    }
    if (bonusTotal > 0) {
        const finalBalance = kid.balance + bonusTotal;
        await sb.from('kids').update({ balance: finalBalance }).eq('id', kidId).eq('user_id', currentUser.id);
        kid.balance = finalBalance;
        await sb.from('transactions').insert(txInserts);
        toast(`🎉 ${kid.name} earned ${eligible.length > 1 ? eligible.length + ' bonuses' : 'a bonus'}: +${R(bonusTotal)}!`);
        render();
    }
}

async function approveChore(cid) {
    const comp  = cache.completions.find(x => x.id === cid);
    if (!comp) return;
    const chore = cache.chores.find(x => x.id === comp.choreId);
    const kid   = cache.kids.find(x => x.id === comp.kidId);
    await sb.from('completions').update({ approved: true }).eq('id', cid).eq('user_id', currentUser.id);
    comp.approved = true;
    if (chore && kid) {
        const newBalance = (kid.balance || 0) + chore.value;
        const txId = uid();
        const txCreatedAt = new Date().toISOString();
        await sb.from('kids').update({ balance: newBalance }).eq('id', kid.id).eq('user_id', currentUser.id);
        await sb.from('transactions').insert({ id: txId, user_id: currentUser.id, kid_id: kid.id, amount: chore.value, type: 'chore', description: chore.name, created_at: txCreatedAt });
        kid.balance = newBalance;
        cache.transactions.push({ id: txId, kidId: kid.id, amount: chore.value, type: 'chore', description: chore.name, createdAt: txCreatedAt });
        await checkBonusMilestones(kid.id, newBalance);
    }
    toast(`✓ Approved! ${R(chore?.value)} added to ${kid?.name}.`);
}
async function approveAllForKid(kidId) {
    const kid   = cache.kids.find(x => x.id === kidId);
    if (!kid) return;
    const comps = cache.completions.filter(c => c.kidId === kidId && !c.approved && !c.rejected && !c.missed);
    if (!comps.length) return;
    const ids = comps.map(c => c.id);
    await sb.from('completions').update({ approved: true }).in('id', ids).eq('user_id', currentUser.id);
    const now = new Date().toISOString();
    const txInserts = [];
    let totalAdded = 0;
    comps.forEach(comp => {
        comp.approved = true;
        const chore = cache.chores.find(x => x.id === comp.choreId);
        if (chore) {
            totalAdded += chore.value;
            txInserts.push({ id: uid(), user_id: currentUser.id, kid_id: kidId, amount: chore.value, type: 'chore', description: chore.name, created_at: now });
        }
    });
    if (totalAdded > 0) {
        const newBalance = (kid.balance || 0) + totalAdded;
        await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
        kid.balance = newBalance;
        await checkBonusMilestones(kidId, newBalance);
    }
    if (txInserts.length) {
        await sb.from('transactions').insert(txInserts);
        txInserts.forEach(t => cache.transactions.push({ id: t.id, kidId, amount: t.amount, type: t.type, description: t.description, createdAt: t.created_at }));
    }
    toast(`✓ All approved! ${R(totalAdded)} added to ${kid.name}.`);
    render();
}
async function rejectChore(cid) {
    await sb.from('completions').update({ rejected: true }).eq('id', cid).eq('user_id', currentUser.id);
    const c = cache.completions.find(x => x.id === cid);
    if (c) c.rejected = true;
    render();
}
async function markDone(choreId) {
    const id = uid();
    const now = new Date();
    const completedAt = now.toISOString();
    const dueDate = toLocalDateStr(now);
    const { error } = await sb.from('completions').insert({ id, user_id: currentUser.id, chore_id: choreId, kid_id: S.kidId, completed_at: completedAt, due_date: dueDate, approved: false, rejected: false, missed: false });
    if (error) return toast('❌ Could not save. Check your connection.');
    cache.completions.push({ id, choreId, kidId: S.kidId, completedAt, dueDate, approved: false, rejected: false, missed: false });
    toast('Marked as done! Waiting for parent to approve. ⏳');
}
async function recordPayout() {
    const kidId  = document.getElementById('po-kid').value;
    const amount = parseFloat(document.getElementById('po-amount').value) || 0;
    if (!kidId)    return toast('⚠️ Please select a kid.');
    if (amount<=0) return toast('⚠️ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    document.getElementById('po-kid').value = '';
    document.getElementById('po-amount').value = '';
    toast(`${R(amount)} payout recorded for ${k.name}.`);
}
async function doModalPayout(kidId) {
    const amount = parseFloat(document.getElementById('m-po-amt').value) || 0;
    if (amount<=0) return toast('⚠️ Please enter a valid amount.');
    const k = cache.kids.find(x => x.id === kidId);
    if (!k) return;
    const newBalance = (k.balance||0) - amount;
    const id = uid();
    const createdAt = new Date().toISOString();
    await sb.from('kids').update({ balance: newBalance }).eq('id', kidId).eq('user_id', currentUser.id);
    await sb.from('transactions').insert({ id, user_id: currentUser.id, kid_id: kidId, amount: -amount, type: 'payout', description: 'Cash payout', created_at: createdAt });
    k.balance = newBalance;
    cache.transactions.push({ id, kidId, amount: -amount, type: 'payout', description: 'Cash payout', createdAt });
    closeModal(); toast(`${R(amount)} payout recorded for ${k.name}.`);
}

async function saveTreeThresholdsFromUI() {
    const vals = ['t1','t2','t3','t4'].map(k => parseFloat(document.getElementById('thresh-'+k)?.value));
    if (vals.some(v => isNaN(v) || v <= 0)) return toast('⚠️ All thresholds must be positive numbers.');
    if (vals[0] >= vals[1] || vals[1] >= vals[2] || vals[2] >= vals[3])
        return toast('⚠️ Each threshold must be higher than the previous one.');
    const ok = await saveTreeThresholds({ t1: vals[0], t2: vals[1], t3: vals[2], t4: vals[3] });
    if (ok) { render(); toast('🌱 Tree thresholds saved!'); }
}
async function resetTreeThresholds() {
    const ok = await saveTreeThresholds({ ...DEFAULT_TREE_THRESHOLDS });
    if (ok) { render(); toast('Reset to defaults.'); }
}

function clearMissedChores() {
    const latest = cache.completions.filter(c => c.missed).map(c => c.dueDate || '').sort().pop() || toLocalDateStr(new Date());
    localStorage.setItem('sprout_missed_cleared_at', latest);
    render();
}

function saveCurrency(code) {
    localStorage.setItem('sprout_currency', code);
    render();
    toast('Currency updated!');
    sb.auth.updateUser({ data: { currency: code } }).then(({ data }) => {
        if (data?.user) currentUser = data.user;
    });
}

async function saveParentPin() {
    const pin = document.getElementById('pp-pin').value.trim();
    if (!/^\d{4}$/.test(pin)) return toast('⚠️ PIN must be exactly 4 digits.');
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: pin } });
    if (error) return toast('❌ Could not save PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN saved! 🔐');
}
async function removeParentPin() {
    const { data, error } = await sb.auth.updateUser({ data: { parent_pin: null } });
    if (error) return toast('❌ Could not remove PIN.');
    if (data?.user) currentUser = data.user;
    closeModal(); toast('Parent PIN removed.');
}

// ─── RENDER ──────────────────────────────────────────────────────
let _logoCyclerTimer = null;
function startLogoCycler() {
    if (_logoCyclerTimer) { clearInterval(_logoCyclerTimer); _logoCyclerTimer = null; }
    const el = document.getElementById('logo-cycler');
    if (!el) return;
    const icons = [0, 1, 2, 3, 4].map(i => treeStageSVG(i, 108));
    let idx = 0;
    el.innerHTML = `<div class="logo-icon-inner">${icons[0]}</div>`;
    _logoCyclerTimer = setInterval(() => {
        const c = document.getElementById('logo-cycler');
        if (!c) { clearInterval(_logoCyclerTimer); _logoCyclerTimer = null; return; }
        const inner = c.querySelector('.logo-icon-inner');
        if (inner) inner.style.animation = 'logoIconExit 0.35s ease-in forwards';
        setTimeout(() => {
            const c2 = document.getElementById('logo-cycler');
            if (!c2) return;
            idx = (idx + 1) % icons.length;
            c2.innerHTML = `<div class="logo-icon-inner">${icons[idx]}</div>`;
        }, 320);
    }, 2800);
}


function render() {
    const toastHtml = S.toast
        ? `<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;font-family:var(--font-family);font-size:14px;font-weight:600;padding:10px 20px;border-radius:var(--radius-full);box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:99;max-width:320px;text-align:center">${S.toast}</div>`
        : '';
    if (!currentUser) {
        document.getElementById('app').innerHTML = vLogin() + toastHtml;
        setTimeout(startLogoCycler, 50);
        return;
    }
    const views = { home: vHome, parent: vParent, 'kid-pin': vKidPin, kid: vKid, 'parent-pin': vParentPin };
    const html  = (views[S.view] || vHome)();
    document.getElementById('app').innerHTML = html + renderModal() + toastHtml;
    if (S.view === 'home' || !S.view) setTimeout(startLogoCycler, 50);
}

initApp();
